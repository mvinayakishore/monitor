<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Remote - Dual Camera View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container {
            max-width: 600px; width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700; padding: 12px 16px; text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        .header h1 { font-size: 18px; margin-bottom: 3px; font-family: 'Georgia', serif; letter-spacing: 2px; }
        .status { font-size: 10px; margin-top: 5px; }
        .status.connected { color: #90EE90; }
        .connect-section { background: #1a1a2e; padding: 12px; text-align: center; border-bottom: 1px solid #ffd70033; }
        .connect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer; font-family: monospace;
        }
        .connect-btn:active { transform: scale(0.97); }
        .connect-btn.disabled { background: #666; opacity: 0.6; }
        .call-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 10px; justify-content: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #ffd70033;
        }
        .call-btn {
            background: #2c3e50; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px 16px;
            border-radius: 25px; font-size: 12px; font-weight: bold;
            cursor: pointer; flex: 1; min-width: 120px; font-family: monospace;
        }
        .call-btn:active { transform: scale(0.97); }
        .call-btn.end { background: #5a1e1e; border-color: #ff6b6b; color: #ff6b6b; }
        .call-btn:disabled { opacity: 0.4; }
        .video-container {
            display: none;
            background: #000;
            padding: 10px;
        }
        .video-container.active {
            display: block;
        }
        .dual-view {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .video-wrapper {
            position: relative;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #ffd700;
            flex: 1;
            min-width: 200px;
        }
        video {
            width: 100%;
            max-height: 280px;
            background: #000;
            display: block;
        }
        .video-label {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            font-family: monospace;
        }
        .call-status {
            text-align: center; font-size: 11px; padding: 8px;
            background: #0f3460; color: #ffd700; font-family: monospace;
        }
        .ids {
            display: flex; justify-content: center; gap: 20px;
            padding: 8px; background: #1a1a2e;
            font-size: 10px; color: #ffd700; font-family: monospace;
            border-bottom: 1px solid #ffd70033; flex-wrap: wrap;
        }
        .id-badge { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 12px; }
        .warning-badge {
            background: #5a1e1e; color: #ff6b6b;
            font-size: 9px; padding: 4px 8px; border-radius: 12px; text-align: center;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .call-btn { font-size: 10px; padding: 8px 12px; }
            .video-wrapper { min-width: 100%; }
            .dual-view { flex-direction: column; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 ASTRO REMOTE 🌟</h1>
            <div class="status" id="statusText">🔮 Monitor Device: Offline</div>
        </div>
        <div class="ids">
            <div class="id-badge">🎮 Remote: APrivate</div>
            <div class="id-badge">📹 Monitor: BPrivate</div>
            <div class="warning-badge">🔇 REMOTE SILENT - No audio sent</div>
        </div>
        <div class="connect-section">
            <button class="connect-btn" id="connectBtn">🔮 CONNECT TO MONITOR DEVICE 🔮</button>
        </div>
        <div class="call-controls">
            <button class="call-btn" id="startCallBtn" disabled>📹 START DUAL CAMERA MONITOR</button>
            <button class="call-btn end" id="endCallBtn" disabled>🔴 Stop Monitor</button>
        </div>
        <div class="call-status" id="callStatus">⚫ Standby - Will show both cameras</div>
        <div class="video-container" id="videoContainer">
            <div class="dual-view" id="dualView">
                <div class="video-wrapper">
                    <video id="frontVideo" autoplay playsinline></video>
                    <span class="video-label">📱 FRONT CAMERA</span>
                </div>
                <div class="video-wrapper">
                    <video id="backVideo" autoplay playsinline></video>
                    <span class="video-label">📷 BACK CAMERA</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        for(let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        const MY_ID = "APrivate";
        const PARTNER_ID = "BPrivate";

        let peer = null;
        let conn = null;
        let frontCall = null;
        let backCall = null;
        let keepAliveInterval = null;

        const connectBtn    = document.getElementById('connectBtn');
        const startCallBtn  = document.getElementById('startCallBtn');
        const endCallBtn    = document.getElementById('endCallBtn');
        const statusText    = document.getElementById('statusText');
        const callStatus    = document.getElementById('callStatus');
        const videoContainer = document.getElementById('videoContainer');
        const frontVideo    = document.getElementById('frontVideo');
        const backVideo     = document.getElementById('backVideo');

        function setStatus(connected) {
            if (connected) {
                statusText.innerText = '✅ Monitor Device: Connected';
                statusText.classList.add('connected');
                connectBtn.innerText = '🌟 DEVICE CONNECTED 🌟';
                connectBtn.disabled = true;
                startCallBtn.disabled = false;
            } else {
                statusText.innerText = '🔮 Monitor Device: Offline';
                statusText.classList.remove('connected');
                connectBtn.innerText = '🔮 CONNECT TO MONITOR DEVICE 🔮';
                connectBtn.disabled = false;
                startCallBtn.disabled = true;
                endCallBtn.disabled = true;
            }
        }

        function preventScreenLock() {
            if ('wakeLock' in navigator) {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                    } catch (err) {}
                };
                requestWakeLock();
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden && wakeLock === null) requestWakeLock();
                });
            }
            
            keepAliveInterval = setInterval(() => {
                if (conn && conn.open) conn.send({ type: 'ping' });
            }, 15000);
        }

        async function startDualMonitor() {
            if (!conn) {
                callStatus.innerText = '❌ Connect to monitor device first';
                return;
            }

            try {
                callStatus.innerText = '📡 Starting dual camera monitor...';
                videoContainer.classList.add('active');

                // Send command to monitor to start both cameras
                conn.send({ type: 'start_dual_cameras' });

            } catch (err) {
                callStatus.innerText = '❌ Failed to start';
                console.error(err);
            }
        }

        // Handle incoming calls from monitor (one for each camera)
        function handleIncomingCall(call) {
            console.log(`[REMOTE] Incoming call from monitor: ${call.metadata?.camera}`);
            
            if (call.metadata?.camera === 'front') {
                frontCall = call;
                call.on('stream', (stream) => {
                    frontVideo.srcObject = stream;
                    frontVideo.play().catch(e => console.log('Front video error:', e));
                    console.log('[REMOTE] Front camera stream received');
                    checkBothStreamsReady();
                });
            } else if (call.metadata?.camera === 'back') {
                backCall = call;
                call.on('stream', (stream) => {
                    backVideo.srcObject = stream;
                    backVideo.play().catch(e => console.log('Back video error:', e));
                    console.log('[REMOTE] Back camera stream received');
                    checkBothStreamsReady();
                });
            }
            
            call.on('close', () => {
                console.log(`[REMOTE] ${call.metadata?.camera} call closed`);
                if (call.metadata?.camera === 'front') frontCall = null;
                if (call.metadata?.camera === 'back') backCall = null;
            });
        }

        function checkBothStreamsReady() {
            if (frontVideo.srcObject && backVideo.srcObject) {
                callStatus.innerText = '👁️ DUAL CAMERA MONITOR ACTIVE - Front + Back';
                endCallBtn.disabled = false;
            }
        }

        function endCall() {
            if (frontCall) { frontCall.close(); frontCall = null; }
            if (backCall) { backCall.close(); backCall = null; }
            frontVideo.srcObject = null;
            backVideo.srcObject = null;
            videoContainer.classList.remove('active');
            callStatus.innerText = '⚫ Monitor stopped';
            endCallBtn.disabled = true;
            
            // Notify monitor to stop
            if (conn && conn.open) {
                conn.send({ type: 'stop_dual_cameras' });
            }
        }

        function setupConnection(connection) {
            conn = connection;
            setStatus(true);
            callStatus.innerText = '✅ Connected - Ready for dual camera';
            
            conn.on('close', () => { 
                setStatus(false); 
                endCall(); 
            });
        }

        function connectToPartner() {
            if (conn) return;
            callStatus.innerText = '🔍 Locating monitor...';
            const connection = peer.connect(PARTNER_ID);
            connection.on('open', () => { setupConnection(connection); });
            connection.on('error', () => { setStatus(false); });
        }

        function init() {
            peer = new Peer(MY_ID);
            
            peer.on('open', () => { 
                callStatus.innerText = '✅ Remote ready - Click Connect'; 
            });
            
            peer.on('call', (call) => {
                // Handle incoming calls from monitor (front/back streams)
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') callStatus.innerText = '❌ ID in use';
            });
            
            preventScreenLock();
        }

        connectBtn.addEventListener('click', connectToPartner);
        startCallBtn.addEventListener('click', startDualMonitor);
        endCallBtn.addEventListener('click', endCall);

        window.addEventListener('beforeunload', () => {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            if (conn) conn.close();
            if (peer) peer.destroy();
        });

        init();
    </script>
</body>
</html>
