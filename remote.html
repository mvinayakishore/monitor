<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Remote - Monitor Controller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container {
            max-width: 500px; width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700; padding: 12px 16px; text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        .header h1 { font-size: 18px; margin-bottom: 3px; }
        .status { font-size: 10px; margin-top: 5px; }
        .status.connected { color: #90EE90; }
        .connect-section { background: #1a1a2e; padding: 12px; text-align: center; border-bottom: 1px solid #ffd70033; }
        .connect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer;
        }
        .connect-btn:active { transform: scale(0.97); }
        .connect-btn.disabled { background: #666; opacity: 0.6; }
        
        .mode-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 12px;
            border-bottom: 1px solid #ffd70033;
        }
        .mode-btn {
            background: #0f3460; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px;
            border-radius: 25px; font-size: 13px;
            cursor: pointer; flex: 1;
            font-weight: bold;
        }
        .mode-btn:active { transform: scale(0.97); }
        .mode-btn.active { background: #ffd700; color: #1a1a2e; }
        
        .camera-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 12px;
            border-bottom: 1px solid #ffd70033;
        }
        .camera-btn {
            background: #0f3460; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px;
            border-radius: 25px; font-size: 13px;
            cursor: pointer; flex: 1;
            font-weight: bold;
        }
        .camera-btn:active { transform: scale(0.97); }
        .camera-btn:disabled { opacity: 0.4; }
        .camera-btn.active { background: #ffd700; color: #1a1a2e; }
        
        .action-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 12px;
            border-bottom: 1px solid #ffd70033;
        }
        .action-btn {
            background: #5a1e1e; color: #ff6b6b;
            border: 1px solid #ff6b6b; padding: 10px;
            border-radius: 25px; font-size: 13px;
            cursor: pointer; flex: 1;
            font-weight: bold;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn.start { background: #0f3460; color: #ffd700; border-color: #ffd700; }
        
        .video-container {
            background: #000;
            padding: 15px;
            display: none;
        }
        .video-container.active {
            display: block;
        }
        .video-wrapper {
            position: relative;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffd700;
        }
        video {
            width: 100%;
            height: auto;
            max-height: 350px;
            background: #000;
            display: block;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .audio-mode-indicator {
            background: #1a1a2e;
            padding: 30px;
            text-align: center;
            border: 2px solid #ffd700;
            border-radius: 15px;
            margin: 15px;
            display: none;
        }
        .audio-mode-indicator.active {
            display: block;
        }
        .audio-mode-indicator span {
            font-size: 64px;
        }
        .audio-mode-indicator p {
            color: #ffd700;
            margin-top: 10px;
            font-size: 14px;
        }
        .status-text {
            text-align: center; font-size: 11px; padding: 8px;
            background: #0f3460; color: #ffd700;
        }
        .ids {
            display: flex; justify-content: center; gap: 15px;
            padding: 8px; background: #1a1a2e;
            font-size: 10px; color: #ffd700;
            border-bottom: 1px solid #ffd70033;
        }
        .id-badge { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 15px; }
        @media (max-width: 480px) {
            body { padding: 8px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 ASTRO REMOTE 🌟</h1>
            <div class="status" id="statusText">🔮 Monitor: Offline</div>
        </div>
        <div class="ids">
            <div class="id-badge">🎮 Remote: APrivate</div>
            <div class="id-badge">📹 Monitor: BPrivate</div>
        </div>
        
        <div class="connect-section">
            <button class="connect-btn" id="connectBtn">🔮 CONNECT TO MONITOR 🔮</button>
        </div>
        
        <div class="action-controls">
            <button class="action-btn start" id="startVideoBtn" disabled>📹 START VIDEO</button>
            <button class="action-btn start" id="startAudioBtn" disabled>🎙️ START AUDIO</button>
            <button class="action-btn" id="endCallBtn" disabled>🔴 END CALL</button>
        </div>
        
        <div class="mode-controls" id="modeControls" style="display: none;">
            <button class="mode-btn" id="videoModeBtn">📹 VIDEO MODE</button>
            <button class="mode-btn" id="audioModeBtn">🎙️ AUDIO ONLY</button>
        </div>
        
        <div class="camera-controls" id="cameraControls" style="display: none;">
            <button class="camera-btn" id="frontCameraBtn">📱 FRONT CAMERA</button>
            <button class="camera-btn" id="backCameraBtn">📷 BACK CAMERA</button>
        </div>
        
        <div class="status-text" id="callStatus">⚫ Ready - Connect to monitor first</div>
        
        <div class="video-container" id="videoContainer">
            <div class="video-wrapper">
                <video id="monitorVideo" autoplay playsinline></video>
                <span class="video-label" id="activeCameraLabel">📹 Monitor Feed</span>
            </div>
        </div>
        
        <div class="audio-mode-indicator" id="audioIndicator">
            <span>🎙️</span>
            <p>Audio Only Mode - Listening to monitor</p>
        </div>
    </div>

    <script>
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        const MY_ID = "APrivate";
        const PARTNER_ID = "BPrivate";
        
        let peer = null;
        let conn = null;
        let mediaCall = null;
        let currentCamera = 'front';
        let currentMode = null;
        let keepAliveInterval = null;

        const connectBtn        = document.getElementById('connectBtn');
        const startVideoBtn     = document.getElementById('startVideoBtn');
        const startAudioBtn     = document.getElementById('startAudioBtn');
        const endCallBtn        = document.getElementById('endCallBtn');
        const videoModeBtn      = document.getElementById('videoModeBtn');
        const audioModeBtn      = document.getElementById('audioModeBtn');
        const frontCameraBtn    = document.getElementById('frontCameraBtn');
        const backCameraBtn     = document.getElementById('backCameraBtn');
        const modeControls      = document.getElementById('modeControls');
        const cameraControls    = document.getElementById('cameraControls');
        const statusText        = document.getElementById('statusText');
        const callStatus        = document.getElementById('callStatus');
        const videoContainer    = document.getElementById('videoContainer');
        const audioIndicator    = document.getElementById('audioIndicator');
        const monitorVideo      = document.getElementById('monitorVideo');
        const activeCameraLabel = document.getElementById('activeCameraLabel');

        function setStatus(connected) {
            if (connected) {
                statusText.innerText = '✅ Monitor: Connected';
                statusText.classList.add('connected');
                connectBtn.innerText = '🌟 CONNECTED 🌟';
                connectBtn.disabled = true;
                startVideoBtn.disabled = false;
                startAudioBtn.disabled = false;
                callStatus.innerText = '✅ Connected - Choose VIDEO or AUDIO';
            } else {
                statusText.innerText = '🔮 Monitor: Offline';
                statusText.classList.remove('connected');
                connectBtn.innerText = '🔮 CONNECT TO MONITOR 🔮';
                connectBtn.disabled = false;
                startVideoBtn.disabled = true;
                startAudioBtn.disabled = true;
                endCallBtn.disabled = true;
                modeControls.style.display = 'none';
                cameraControls.style.display = 'none';
                videoContainer.classList.remove('active');
                audioIndicator.classList.remove('active');
                currentMode = null;
            }
        }

        function preventScreenLock() {
            if ('wakeLock' in navigator) {
                let wakeLock = null;
                const request = async () => {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                    } catch (err) {}
                };
                request();
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden && wakeLock === null) request();
                });
            }
            
            keepAliveInterval = setInterval(() => {
                if (conn && conn.open) conn.send({ type: 'ping' });
            }, 15000);
        }

        function endCall() {
            console.log('[REMOTE] Ending call...');
            
            if (conn && conn.open) {
                conn.send({ type: 'stop_all' });
            }
            
            if (mediaCall) {
                mediaCall.close();
                mediaCall = null;
            }
            
            monitorVideo.srcObject = null;
            videoContainer.classList.remove('active');
            audioIndicator.classList.remove('active');
            modeControls.style.display = 'none';
            cameraControls.style.display = 'none';
            currentMode = null;
            
            startVideoBtn.disabled = false;
            startAudioBtn.disabled = false;
            endCallBtn.disabled = true;
            
            callStatus.innerText = '✅ Call ended - Select VIDEO or AUDIO';
        }

        function startVideo() {
            if (!conn || !conn.open) {
                callStatus.innerText = '❌ Not connected';
                return;
            }
            
            currentMode = 'video';
            currentCamera = 'front';
            
            startVideoBtn.disabled = true;
            startAudioBtn.disabled = true;
            endCallBtn.disabled = false;
            modeControls.style.display = 'flex';
            cameraControls.style.display = 'flex';
            videoContainer.classList.add('active');
            audioIndicator.classList.remove('active');
            
            frontCameraBtn.classList.add('active');
            backCameraBtn.classList.remove('active');
            videoModeBtn.classList.add('active');
            audioModeBtn.classList.remove('active');
            activeCameraLabel.innerHTML = '📱 MONITOR FRONT CAMERA';
            
            callStatus.innerText = `⏳ Starting VIDEO mode...`;
            
            conn.send({ type: 'start_video', camera: 'front' });
        }
        
        function startAudio() {
            if (!conn || !conn.open) {
                callStatus.innerText = '❌ Not connected';
                return;
            }
            
            currentMode = 'audio';
            
            startVideoBtn.disabled = true;
            startAudioBtn.disabled = true;
            endCallBtn.disabled = false;
            modeControls.style.display = 'flex';
            cameraControls.style.display = 'none';
            videoContainer.classList.remove('active');
            audioIndicator.classList.add('active');
            
            videoModeBtn.classList.remove('active');
            audioModeBtn.classList.add('active');
            
            callStatus.innerText = `⏳ Starting AUDIO mode...`;
            
            conn.send({ type: 'start_audio' });
        }

        function switchMode(mode) {
            if (!conn || !conn.open) return;
            
            if (mode === 'video') {
                // First end current, then start video
                if (conn && conn.open) {
                    conn.send({ type: 'stop_all' });
                }
                setTimeout(() => {
                    conn.send({ type: 'start_video', camera: currentCamera });
                }, 500);
            } else if (mode === 'audio') {
                if (conn && conn.open) {
                    conn.send({ type: 'stop_all' });
                }
                setTimeout(() => {
                    conn.send({ type: 'start_audio' });
                }, 500);
            }
        }

        function switchMonitorCamera(camera) {
            if (!conn || !conn.open || currentMode !== 'video') return;
            
            currentCamera = camera;
            
            if (camera === 'front') {
                frontCameraBtn.classList.add('active');
                backCameraBtn.classList.remove('active');
                activeCameraLabel.innerHTML = '📱 MONITOR FRONT CAMERA';
            } else {
                frontCameraBtn.classList.remove('active');
                backCameraBtn.classList.add('active');
                activeCameraLabel.innerHTML = '📷 MONITOR BACK CAMERA';
            }
            
            callStatus.innerText = `⏳ Switching to ${camera} camera...`;
            
            conn.send({ type: 'switch_camera', camera: camera });
        }

        function handleIncomingCall(call) {
            console.log('[REMOTE] Incoming call from monitor');
            
            if (mediaCall) {
                monitorVideo.pause();
                monitorVideo.srcObject = null;
                mediaCall.close();
            }
            
            mediaCall = call;
            call.answer();
            
            call.on('stream', (stream) => {
                console.log('[REMOTE] Stream received, mode:', currentMode);
                
                if (currentMode === 'video') {
                    monitorVideo.pause();
                    monitorVideo.srcObject = null;
                    
                    setTimeout(() => {
                        monitorVideo.srcObject = stream;
                        monitorVideo.load();
                        monitorVideo.play().catch(e => console.log(e));
                    }, 100);
                    
                    videoContainer.classList.add('active');
                    audioIndicator.classList.remove('active');
                    callStatus.innerText = `👁️ Monitoring ${currentCamera} camera LIVE`;
                    
                } else if (currentMode === 'audio') {
                    videoContainer.classList.remove('active');
                    audioIndicator.classList.add('active');
                    
                    const audioElement = new Audio();
                    audioElement.srcObject = stream;
                    audioElement.play().catch(e => console.log('Audio error:', e));
                    
                    callStatus.innerText = '🎙️ Audio Only - Listening to monitor';
                }
            });
            
            call.on('close', () => {
                console.log('[REMOTE] Stream closed');
                if (currentMode !== 'audio' && currentMode !== 'video') {
                    monitorVideo.srcObject = null;
                    videoContainer.classList.remove('active');
                    audioIndicator.classList.remove('active');
                }
            });
        }

        function setupConnection(connection) {
            conn = connection;
            setStatus(true);
            
            conn.on('close', () => { 
                setStatus(false); 
                endCall();
            });
        }

        function connectToPartner() {
            if (conn) return;
            callStatus.innerText = '🔍 Connecting...';
            const connection = peer.connect(PARTNER_ID);
            connection.on('open', () => { 
                callStatus.innerText = '✅ Connected!';
                setupConnection(connection); 
            });
            connection.on('error', () => { 
                callStatus.innerText = '❌ Monitor offline';
                setStatus(false); 
            });
        }

        function init() {
            peer = new Peer(MY_ID);
            
            peer.on('open', () => { 
                callStatus.innerText = '✅ Remote ready - Click Connect'; 
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') callStatus.innerText = '❌ ID in use';
            });
            
            preventScreenLock();
        }

        connectBtn.addEventListener('click', connectToPartner);
        startVideoBtn.addEventListener('click', startVideo);
        startAudioBtn.addEventListener('click', startAudio);
        endCallBtn.addEventListener('click', endCall);
        videoModeBtn.addEventListener('click', () => switchMode('video'));
        audioModeBtn.addEventListener('click', () => switchMode('audio'));
        frontCameraBtn.addEventListener('click', () => switchMonitorCamera('front'));
        backCameraBtn.addEventListener('click', () => switchMonitorCamera('back'));

        window.addEventListener('beforeunload', () => {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            if (conn) conn.close();
            if (peer) peer.destroy();
        });

        init();
    </script>
</body>
</html>
