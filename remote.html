<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Remote - Dual Live Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container {
            max-width: 700px; width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700; padding: 12px 16px; text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        .header h1 { font-size: 18px; margin-bottom: 3px; }
        .status { font-size: 10px; margin-top: 5px; }
        .status.connected { color: #90EE90; }
        .connect-section { background: #1a1a2e; padding: 12px; text-align: center; border-bottom: 1px solid #ffd70033; }
        .connect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer;
        }
        .connect-btn:active { transform: scale(0.97); }
        .connect-btn.disabled { background: #666; opacity: 0.6; }
        
        .call-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 12px;
            justify-content: center;
            border-bottom: 1px solid #ffd70033;
        }
        .call-btn {
            background: #0f3460; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px 20px;
            border-radius: 25px; font-size: 13px;
            cursor: pointer; font-weight: bold;
        }
        .call-btn:active { transform: scale(0.97); }
        .call-btn.end { background: #5a1e1e; border-color: #ff6b6b; color: #ff6b6b; }
        .call-btn:disabled { opacity: 0.4; }
        
        .video-container {
            display: none;
            background: #000;
            padding: 15px;
        }
        .video-container.active {
            display: block;
        }
        .dual-view {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .video-wrapper {
            position: relative;
            background: #1a1a2e;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffd700;
            flex: 1;
            min-width: 250px;
        }
        video {
            width: 100%;
            height: auto;
            max-height: 320px;
            background: #000;
            display: block;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-text {
            text-align: center; font-size: 11px; padding: 8px;
            background: #0f3460; color: #ffd700;
        }
        .ids {
            display: flex; justify-content: center; gap: 15px;
            padding: 8px; background: #1a1a2e;
            font-size: 10px; color: #ffd700;
            border-bottom: 1px solid #ffd70033;
        }
        .id-badge { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 15px; }
        @media (max-width: 550px) {
            body { padding: 8px; }
            .video-wrapper { min-width: 100%; }
            .dual-view { flex-direction: column; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 ASTRO REMOTE 🌟</h1>
            <div class="status" id="statusText">🔮 Monitor: Offline</div>
        </div>
        <div class="ids">
            <div class="id-badge">🎮 Remote: APrivate</div>
            <div class="id-badge">📹 Monitor: BPrivate</div>
        </div>
        
        <div class="connect-section">
            <button class="connect-btn" id="connectBtn">🔮 CONNECT TO MONITOR 🔮</button>
        </div>
        
        <div class="call-controls">
            <button class="call-btn" id="startDualBtn" disabled>📹 START DUAL LIVE VIEW</button>
            <button class="call-btn end" id="stopBtn" disabled>🔴 STOP</button>
        </div>
        
        <div class="status-text" id="callStatus">⚫ Ready - Connect to monitor first</div>
        
        <div class="video-container" id="videoContainer">
            <div class="dual-view">
                <div class="video-wrapper">
                    <video id="frontVideo" autoplay playsinline></video>
                    <span class="video-label">📱 FRONT CAMERA (LIVE)</span>
                </div>
                <div class="video-wrapper">
                    <video id="backVideo" autoplay playsinline></video>
                    <span class="video-label">📷 BACK CAMERA (LIVE)</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        const MY_ID = "APrivate";
        const PARTNER_ID = "BPrivate";
        
        let peer = null;
        let conn = null;
        let frontCall = null;
        let backCall = null;
        let keepAliveInterval = null;

        const connectBtn    = document.getElementById('connectBtn');
        const startDualBtn  = document.getElementById('startDualBtn');
        const stopBtn       = document.getElementById('stopBtn');
        const statusText    = document.getElementById('statusText');
        const callStatus    = document.getElementById('callStatus');
        const videoContainer = document.getElementById('videoContainer');
        const frontVideo    = document.getElementById('frontVideo');
        const backVideo     = document.getElementById('backVideo');

        function setStatus(connected) {
            if (connected) {
                statusText.innerText = '✅ Monitor: Connected';
                statusText.classList.add('connected');
                connectBtn.innerText = '🌟 CONNECTED 🌟';
                connectBtn.disabled = true;
                startDualBtn.disabled = false;
                callStatus.innerText = '✅ Connected - Click START DUAL LIVE VIEW';
            } else {
                statusText.innerText = '🔮 Monitor: Offline';
                statusText.classList.remove('connected');
                connectBtn.innerText = '🔮 CONNECT TO MONITOR 🔮';
                connectBtn.disabled = false;
                startDualBtn.disabled = true;
                stopBtn.disabled = true;
                videoContainer.classList.remove('active');
            }
        }

        function preventScreenLock() {
            if ('wakeLock' in navigator) {
                let wakeLock = null;
                const request = async () => {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                    } catch (err) {}
                };
                request();
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden && wakeLock === null) request();
                });
            }
            
            keepAliveInterval = setInterval(() => {
                if (conn && conn.open) conn.send({ type: 'ping' });
            }, 15000);
        }

        function startDualLiveView() {
            if (!conn || !conn.open) {
                callStatus.innerText = '❌ Not connected to monitor';
                return;
            }
            
            callStatus.innerText = '📡 Requesting dual live stream...';
            videoContainer.classList.add('active');
            
            // Tell monitor to start sending both camera streams
            conn.send({ type: 'start_dual_stream' });
        }

        function handleIncomingCall(call) {
            const camera = call.metadata?.camera;
            console.log(`[REMOTE] Receiving ${camera} live stream`);
            
            if (camera === 'front') {
                if (frontCall) frontCall.close();
                frontCall = call;
                call.on('stream', (stream) => {
                    frontVideo.srcObject = stream;
                    frontVideo.play().catch(e => console.log(e));
                    console.log('[REMOTE] Front live stream active');
                    checkReady();
                });
            } else if (camera === 'back') {
                if (backCall) backCall.close();
                backCall = call;
                call.on('stream', (stream) => {
                    backVideo.srcObject = stream;
                    backVideo.play().catch(e => console.log(e));
                    console.log('[REMOTE] Back live stream active');
                    checkReady();
                });
            }
            
            call.on('close', () => {
                console.log(`[REMOTE] ${camera} live stream closed`);
                if (camera === 'front') frontVideo.srcObject = null;
                if (camera === 'back') backVideo.srcObject = null;
            });
        }

        function checkReady() {
            if (frontVideo.srcObject && backVideo.srcObject) {
                callStatus.innerText = '👁️ DUAL LIVE VIEW ACTIVE - Front + Back';
                stopBtn.disabled = false;
            }
        }

        function stopDualLiveView() {
            if (conn && conn.open) {
                conn.send({ type: 'stop_dual_stream' });
            }
            
            if (frontCall) { frontCall.close(); frontCall = null; }
            if (backCall) { backCall.close(); backCall = null; }
            frontVideo.srcObject = null;
            backVideo.srcObject = null;
            videoContainer.classList.remove('active');
            callStatus.innerText = '⚫ Stopped';
            stopBtn.disabled = true;
            startDualBtn.disabled = false;
        }

        function setupConnection(connection) {
            conn = connection;
            setStatus(true);
            
            conn.on('close', () => { 
                setStatus(false); 
                stopDualLiveView();
            });
        }

        function connectToPartner() {
            if (conn) return;
            callStatus.innerText = '🔍 Connecting...';
            const connection = peer.connect(PARTNER_ID);
            connection.on('open', () => { 
                callStatus.innerText = '✅ Connected!';
                setupConnection(connection); 
            });
            connection.on('error', () => { 
                callStatus.innerText = '❌ Monitor offline';
                setStatus(false); 
            });
        }

        function init() {
            peer = new Peer(MY_ID);
            
            peer.on('open', () => { 
                callStatus.innerText = '✅ Remote ready - Click Connect'; 
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') callStatus.innerText = '❌ ID in use';
            });
            
            preventScreenLock();
        }

        connectBtn.addEventListener('click', connectToPartner);
        startDualBtn.addEventListener('click', startDualLiveView);
        stopBtn.addEventListener('click', stopDualLiveView);

        window.addEventListener('beforeunload', () => {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            if (conn) conn.close();
            if (peer) peer.destroy();
        });

        init();
    </script>
</body>
</html>
