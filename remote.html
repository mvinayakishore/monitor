<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Remote - Chat & Camera Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Times New Roman', Georgia, serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .container {
            max-width: 500px; width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative; z-index: 1;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700; padding: 12px 16px; text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        .header h1 { font-size: 18px; margin-bottom: 3px; }
        .status { font-size: 10px; margin-top: 5px; }
        .status.connected { color: #90EE90; }
        .connect-section { background: #1a1a2e; padding: 12px; text-align: center; border-bottom: 1px solid #ffd70033; }
        .connect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            color: #1a1a2e; border: none; padding: 10px 24px;
            border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer;
        }
        .connect-btn:active { transform: scale(0.97); }
        .connect-btn.disabled { background: #666; opacity: 0.6; }
        
        .camera-controls {
            background: #1a1a2e; padding: 12px;
            display: flex; gap: 12px;
            border-bottom: 1px solid #ffd70033;
        }
        .camera-btn {
            background: #0f3460; color: #ffd700;
            border: 1px solid #ffd700; padding: 10px;
            border-radius: 25px; font-size: 12px;
            cursor: pointer; flex: 1;
            font-weight: bold;
        }
        .camera-btn:active { transform: scale(0.97); }
        .camera-btn:disabled { opacity: 0.4; }
        
        .photo-preview {
            background: #1a1a2e; padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ffd70033;
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 10px;
            border: 2px solid #ffd700;
        }
        .photo-placeholder {
            color: #888;
            font-size: 11px;
            padding: 20px;
        }
        
        .messages-area {
            height: 280px;
            overflow-y: auto;
            padding: 12px;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 12px;
            word-wrap: break-word;
        }
        .message.sent {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            color: #ffd700;
            align-self: flex-end;
        }
        .message.received {
            background: white;
            color: #333;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-system {
            text-align: center;
            font-size: 9px;
            padding: 5px;
            background: #e8e0d0;
            color: #666;
            border-radius: 12px;
            margin: 2px 0;
        }
        .input-area {
            padding: 12px;
            background: white;
            border-top: 1px solid #ffd700;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ffd700;
            border-radius: 25px;
            font-size: 12px;
            outline: none;
        }
        .input-area button {
            background: #2c3e50;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            cursor: pointer;
        }
        .ids {
            display: flex; justify-content: center; gap: 15px;
            padding: 8px; background: #1a1a2e;
            font-size: 10px; color: #ffd700;
            border-bottom: 1px solid #ffd70033;
        }
        .id-badge { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 15px; }
        .connection-status {
            text-align: center; font-size: 10px; padding: 6px;
            background: #0f3460; color: #ffd700;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .messages-area { height: 220px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="header">
            <h1>🌟 ASTRO REMOTE 🌟</h1>
            <div class="status" id="statusText">🔮 Monitor: Offline</div>
        </div>
        <div class="ids">
            <div class="id-badge">🎮 Remote: APrivate</div>
            <div class="id-badge">📹 Monitor: BPrivate</div>
        </div>
        
        <div class="connect-section">
            <button class="connect-btn" id="connectBtn">🔮 CONNECT TO MONITOR 🔮</button>
        </div>
        
        <div class="camera-controls">
            <button class="camera-btn" id="frontPhotoBtn" disabled>📱 FRONT CAMERA</button>
            <button class="camera-btn" id="backPhotoBtn" disabled>📷 BACK CAMERA</button>
        </div>
        
        <div class="photo-preview" id="photoPreview">
            <img id="previewImg" style="display: none;">
            <div id="photoPlaceholder" class="photo-placeholder">📸 Captured photo will appear here</div>
        </div>
        
        <div class="connection-status" id="callStatus">⚫ Not connected</div>
        
        <div class="messages-area" id="messages">
            <div class="message-system">🔮 Connect to monitor to start chatting and test cameras</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="💫 Type a message..." disabled>
            <button id="sendBtn" disabled>📨 Send</button>
        </div>
    </div>

    <script>
        for(let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('stars').appendChild(star);
        }

        const MY_ID = "APrivate";
        const PARTNER_ID = "BPrivate";
        const ENCRYPTION_KEY = "MySecretKey2024!@#$";
        
        let peer = null;
        let conn = null;
        
        const connectBtn = document.getElementById('connectBtn');
        const frontPhotoBtn = document.getElementById('frontPhotoBtn');
        const backPhotoBtn = document.getElementById('backPhotoBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const messagesDiv = document.getElementById('messages');
        const statusText = document.getElementById('statusText');
        const callStatus = document.getElementById('callStatus');
        const previewImg = document.getElementById('previewImg');
        const photoPlaceholder = document.getElementById('photoPlaceholder');
        
        function addMessage(text, type) {
            if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes('Connect')) {
                messagesDiv.innerHTML = '';
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `<div>${type === 'sent' ? '🌙 ' : '✨ '}${escapeHtml(text)}</div><div style="font-size: 8px; opacity: 0.6; margin-top: 2px;">${new Date().toLocaleTimeString()}</div>`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-system';
            msgDiv.innerText = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function encrypt(text) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
            }
            return btoa(result);
        }
        
        function decrypt(encrypted) {
            try {
                let decoded = atob(encrypted);
                let result = '';
                for (let i = 0; i < decoded.length; i++) {
                    result += String.fromCharCode(decoded.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
                }
                return result;
            } catch(e) { return null; }
        }
        
        async function capturePhoto(camera) {
            if (!conn) {
                addSystemMessage('❌ Not connected to monitor');
                return;
            }
            
            const isBack = (camera === 'back');
            callStatus.innerText = `📸 Accessing ${camera} camera...`;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: isBack ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 300));
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const photoData = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(t => t.stop());
                
                // Show preview
                previewImg.src = photoData;
                previewImg.style.display = 'block';
                photoPlaceholder.style.display = 'none';
                
                // Send to monitor
                const encrypted = encrypt(photoData);
                conn.send({ type: 'photo', camera: camera, data: encrypted });
                
                addSystemMessage(`📷 You captured ${camera} camera photo and sent to monitor`);
                callStatus.innerText = `✅ ${camera} photo sent`;
                setTimeout(() => {
                    if (callStatus.innerText.includes('photo')) {
                        callStatus.innerText = '✅ Connected';
                    }
                }, 2000);
                
            } catch (err) {
                addSystemMessage(`❌ ${camera} camera error: ${err.message}`);
                callStatus.innerText = `❌ ${camera} camera failed`;
            }
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !conn) return;
            
            const encrypted = encrypt(text);
            conn.send({ type: 'chat', text: encrypted });
            addMessage(text, 'sent');
            messageInput.value = '';
        }
        
        function handleData(data) {
            if (data.type === 'chat') {
                const decrypted = decrypt(data.text);
                if (decrypted) addMessage(decrypted, 'received');
            } else if (data.type === 'photo') {
                const decrypted = decrypt(data.data);
                if (decrypted) {
                    addSystemMessage(`📸 Monitor sent a ${data.camera} camera photo`);
                    previewImg.src = decrypted;
                    previewImg.style.display = 'block';
                    photoPlaceholder.style.display = 'none';
                }
            }
        }
        
        function setStatus(connected) {
            if (connected) {
                statusText.innerText = '✅ Monitor: Connected';
                statusText.classList.add('connected');
                connectBtn.innerText = '🌟 CONNECTED 🌟';
                connectBtn.disabled = true;
                frontPhotoBtn.disabled = false;
                backPhotoBtn.disabled = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                callStatus.innerText = '✅ Connected - Ready';
                addSystemMessage('🔮 Connected to monitor! Send messages or test cameras');
            } else {
                statusText.innerText = '🔮 Monitor: Offline';
                statusText.classList.remove('connected');
                connectBtn.innerText = '🔮 CONNECT TO MONITOR 🔮';
                connectBtn.disabled = false;
                frontPhotoBtn.disabled = true;
                backPhotoBtn.disabled = true;
                messageInput.disabled = true;
                sendBtn.disabled = true;
                callStatus.innerText = '⚫ Not connected';
            }
        }
        
        function setupConnection(connection) {
            conn = connection;
            setStatus(true);
            conn.on('data', handleData);
            conn.on('close', () => {
                setStatus(false);
                addSystemMessage('⚠️ Connection lost');
            });
        }
        
        function connectToPartner() {
            if (conn) return;
            addSystemMessage(`🔍 Connecting to monitor...`);
            const connection = peer.connect(PARTNER_ID);
            connection.on('open', () => {
                addSystemMessage(`✨ Connected to monitor!`);
                setupConnection(connection);
            });
            connection.on('error', () => {
                addSystemMessage(`❌ Could not find monitor. Make sure it's online.`);
                setStatus(false);
            });
        }
        
        function init() {
            peer = new Peer(MY_ID);
            peer.on('open', () => {
                addSystemMessage(`🌟 Remote active (${MY_ID})`);
                addSystemMessage(`🔮 Click Connect to link with monitor`);
            });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    addSystemMessage(`❌ ID "${MY_ID}" already in use. Close other tabs.`);
                }
            });
        }
        
        connectBtn.addEventListener('click', connectToPartner);
        frontPhotoBtn.addEventListener('click', () => capturePhoto('front'));
        backPhotoBtn.addEventListener('click', () => capturePhoto('back'));
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        init();
    </script>
</body>
</html>
