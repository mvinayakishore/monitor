<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Remote Controlled Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localPreview" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        // Hardcoded camera IDs from your debug tool
        // Based on your output: camera 1 = front, camera 0 = back
        const FRONT_CAMERA_ID = "10b9b4560c08ab4ec010cccb8ca88678";
        const BACK_CAMERA_ID = "981ef5a661d52d5e17699148be2829d3";
        
        let peer = null;
        let dataConn = null;
        let currentCall = null;
        let currentStream = null;
        let currentCamera = "front";
        let wakeLock = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        async function getCameraStream(camera) {
            const isBack = (camera === 'back');
            const targetDeviceId = isBack ? BACK_CAMERA_ID : FRONT_CAMERA_ID;
            
            log(`Getting ${camera} camera with deviceId: ${targetDeviceId.substring(0, 20)}...`);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        deviceId: { exact: targetDeviceId },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ ${camera} camera acquired - label: ${track.label}, facingMode: ${settings.facingMode}`);
                return stream;
                
            } catch (err) {
                log(`deviceId failed: ${err.message}`);
                
                // Fallback to facingMode
                try {
                    log(`Falling back to facingMode for ${camera}`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: {
                            facingMode: isBack ? "environment" : "user",
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    const track = stream.getVideoTracks()[0];
                    const settings = track.getSettings();
                    log(`✅ ${camera} camera via facingMode - facingMode: ${settings.facingMode}`);
                    return stream;
                } catch (e) {
                    log(`facingMode failed: ${e.message}`);
                    throw e;
                }
            }
        }
        
        async function startStream(camera) {
            // Don't switch if already using this camera
            if (camera === currentCamera && currentCall) {
                log(`Already using ${camera} camera, skipping`);
                return;
            }
            
            log(`🔄 Switching to ${camera} camera...`);
            
            // Close existing call
            if (currentCall) {
                log('Closing existing call');
                currentCall.close();
                currentCall = null;
            }
            
            // Stop existing stream
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            
            try {
                const stream = await getCameraStream(camera);
                currentStream = stream;
                currentCamera = camera;
                
                // Local preview (hidden)
                document.getElementById('localPreview').srcObject = stream;
                
                log(`Calling ${PARTNER_ID} with ${camera} camera...`);
                
                // Create new call
                currentCall = peer.call(PARTNER_ID, stream, {
                    metadata: { camera: camera, type: 'live' }
                });
                
                currentCall.on('open', () => {
                    log(`✅ Call opened for ${camera} camera`);
                });
                
                currentCall.on('stream', () => {
                    log(`✅ Stream sent to remote for ${camera} camera`);
                });
                
                currentCall.on('close', () => {
                    log(`Call closed for ${camera} camera`);
                    currentCall = null;
                });
                
                currentCall.on('error', (err) => {
                    log(`❌ Call error: ${err}`);
                });
                
            } catch (err) {
                log(`❌ Failed to start stream: ${err.message}`);
            }
        }
        
        function handleDataMessage(data) {
            log(`Received command: ${data.type}`);
            
            if (data.type === 'switch_camera') {
                const targetCamera = data.camera;
                log(`📷 Switch command to ${targetCamera} camera`);
                startStream(targetCamera);
            }
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE - ID: ${MY_ID}`);
                log(`Front Camera ID: ${FRONT_CAMERA_ID.substring(0, 20)}...`);
                log(`Back Camera ID: ${BACK_CAMERA_ID.substring(0, 20)}...`);
                log(`Ready for connection from ${PARTNER_ID}`);
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Remote connected`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => {
                        log('Remote disconnected');
                        if (currentCall) currentCall.close();
                        currentCall = null;
                        dataConn = null;
                    });
                    
                    // Start with front camera by default
                    log('Starting default front camera stream...');
                    startStream('front');
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('╔════════════════════════════════╗');
        log('║   ASTRO MONITOR               ║');
        log('║   Remote Controlled Camera    ║');
        log(`║   Front ID: ${FRONT_CAMERA_ID.substring(0, 16)}...  ║`);
        log(`║   Back ID:  ${BACK_CAMERA_ID.substring(0, 16)}...  ║`);
        log('╚════════════════════════════════╝');
        
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
