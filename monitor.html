<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Debug</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 10px; font-size: 12px; }
        button { background: #0f0; color: #111; border: none; padding: 8px 14px; margin: 4px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
        button.red { background: #f44; color: #fff; }
        #log { background: #000; border: 1px solid #0f0; padding: 8px; margin-top: 10px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        video { width: 100%; max-height: 200px; background: #000; display: block; margin-top: 10px; border: 1px solid #0f0; }
        .section { border: 1px solid #333; padding: 8px; margin: 6px 0; border-radius: 6px; }
    </style>
</head>
<body>
    <h3 style="color:#ffd700">📷 Camera Debug Tool</h3>

    <div class="section">
        <b>Step 1: List Cameras</b><br>
        <button onclick="listCameras()">List All Cameras</button>
    </div>

    <div class="section">
        <b>Step 2: Test Camera Access</b><br>
        <button onclick="testCamera('front_exact')">Front (exact)</button>
        <button onclick="testCamera('back_exact')">Back (exact)</button>
        <button onclick="testCamera('front_ideal')">Front (ideal)</button>
        <button onclick="testCamera('back_ideal')">Back (ideal)</button>
        <button onclick="testCamera('default')">Default</button>
    </div>

    <div class="section">
        <b>Step 3: Test by DeviceId</b><br>
        <div id="deviceButtons">Run Step 1 first</div>
    </div>

    <div class="section">
        <button class="red" onclick="stopAll()">⏹ Stop All</button>
    </div>

    <video id="preview" autoplay playsinline muted></video>
    <div id="log">Ready...\n</div>

    <script>
        let activeStream = null;

        function log(msg, color) {
            const el = document.getElementById('log');
            const line = document.createElement('div');
            line.style.color = color || '#0f0';
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }

        function stopAll() {
            if (activeStream) {
                activeStream.getTracks().forEach(t => { t.stop(); log(`Stopped ${t.kind} track`, '#fa0'); });
                activeStream = null;
            }
            document.getElementById('preview').srcObject = null;
            log('All stopped', '#fa0');
        }

        async function listCameras() {
            log('--- Listing cameras ---', '#ff0');
            try {
                // Request permission first so labels are populated
                const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                tmp.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const cams = devices.filter(d => d.kind === 'videoinput');
                log(`Found ${cams.length} camera(s):`);

                const btnContainer = document.getElementById('deviceButtons');
                btnContainer.innerHTML = '';

                cams.forEach((c, i) => {
                    log(`  [${i}] label="${c.label}" id=${c.deviceId.substring(0,24)}...`);
                    const btn = document.createElement('button');
                    btn.textContent = `[${i}] ${c.label || 'Unnamed'}`;
                    btn.onclick = () => testByDeviceId(c.deviceId, c.label);
                    btnContainer.appendChild(btn);
                });
            } catch (e) {
                log(`Error: ${e.name}: ${e.message}`, '#f44');
            }
        }

        async function testCamera(mode) {
            stopAll();
            log(`--- Testing: ${mode} ---`, '#ff0');

            let constraints;
            switch(mode) {
                case 'front_exact': constraints = { video: { facingMode: { exact: 'user' } }, audio: false }; break;
                case 'back_exact':  constraints = { video: { facingMode: { exact: 'environment' } }, audio: false }; break;
                case 'front_ideal': constraints = { video: { facingMode: { ideal: 'user' } }, audio: false }; break;
                case 'back_ideal':  constraints = { video: { facingMode: { ideal: 'environment' } }, audio: false }; break;
                case 'default':     constraints = { video: true, audio: false }; break;
            }

            log(`Constraints: ${JSON.stringify(constraints.video)}`);
            try {
                const s = await navigator.mediaDevices.getUserMedia(constraints);
                activeStream = s;
                const track = s.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ SUCCESS`, '#0f0');
                log(`  facingMode: ${settings.facingMode || 'not reported'}`);
                log(`  deviceId: ${(settings.deviceId || '').substring(0,24)}...`);
                log(`  label: ${track.label}`);
                log(`  resolution: ${settings.width}x${settings.height}`);
                document.getElementById('preview').srcObject = s;
            } catch (e) {
                log(`❌ FAILED: ${e.name}: ${e.message}`, '#f44');
            }
        }

        async function testByDeviceId(deviceId, label) {
            stopAll();
            log(`--- Testing deviceId: ${label} ---`, '#ff0');
            log(`deviceId: ${deviceId.substring(0,32)}...`);
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: deviceId } },
                    audio: false
                });
                activeStream = s;
                const track = s.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ SUCCESS`, '#0f0');
                log(`  facingMode: ${settings.facingMode || 'not reported'}`);
                log(`  label: ${track.label}`);
                log(`  resolution: ${settings.width}x${settings.height}`);
                document.getElementById('preview').srcObject = s;
            } catch (e) {
                log(`❌ FAILED: ${e.name}: ${e.message}`, '#f44');
            }
        }
    </script>
</body>
</html>
