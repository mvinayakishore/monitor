<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Remote Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = "front";
        let wakeLock = null;
        
        // Camera device IDs
        let FRONT_CAMERA_ID = null;
        let BACK_CAMERA_ID = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        // Detect cameras
        async function detectCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} camera(s):`);
                cameras.forEach((cam, i) => {
                    log(`  [${i}] ${cam.label || 'Unnamed'}`);
                    
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        BACK_CAMERA_ID = cam.deviceId;
                        log(`  ✅ BACK camera identified`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        FRONT_CAMERA_ID = cam.deviceId;
                        log(`  ✅ FRONT camera identified`);
                    }
                });
                
                // Fallback based on your debug output
                if (!BACK_CAMERA_ID && cameras[0]) {
                    BACK_CAMERA_ID = cameras[0].deviceId;
                    log(`  Using camera[0] as BACK`);
                }
                if (!FRONT_CAMERA_ID && cameras[1]) {
                    FRONT_CAMERA_ID = cameras[1].deviceId;
                    log(`  Using camera[1] as FRONT`);
                }
                
                return true;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        // Get stream using exact deviceId
        async function getStreamForCamera(camera, isVideo) {
            if (!isVideo) {
                return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            }
            
            const useBackCamera = (camera === 'back');
            const targetDeviceId = useBackCamera ? BACK_CAMERA_ID : FRONT_CAMERA_ID;
            
            if (targetDeviceId) {
                try {
                    log(`Getting ${camera} camera with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: {
                            deviceId: { exact: targetDeviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    const track = stream.getVideoTracks()[0];
                    const settings = track.getSettings();
                    log(`✅ ${camera} camera acquired - facingMode: ${settings.facingMode}, label: ${track.label}`);
                    return stream;
                } catch (err) {
                    log(`deviceId failed: ${err.message}`);
                }
            }
            
            // Fallback to facingMode
            try {
                log(`Falling back to facingMode for ${camera}`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        facingMode: { exact: useBackCamera ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`✅ ${camera} camera acquired via facingMode - facingMode: ${settings.facingMode}`);
                return stream;
            } catch (err) {
                log(`facingMode failed: ${err.message}`);
            }
            
            // Final fallback
            log(`Using default camera for ${camera}`);
            return await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { width: { ideal: 640 }, height: { ideal: 480 } }
            });
        }
        
        // Switch camera - simplified without renegotiation
        async function switchCamera(targetCamera) {
            if (targetCamera === currentCamera) {
                log(`Already using ${targetCamera}`);
                return;
            }
            
            if (!currentCall) {
                currentCamera = targetCamera;
                return;
            }
            
            const isVideo = (currentCall.metadata?.type || 'voice') === 'video';
            
            if (!isVideo) {
                currentCamera = targetCamera;
                if (dataConn) dataConn.send({ type: 'camera_switched', camera: targetCamera });
                return;
            }
            
            log(`🔄 Switching to ${targetCamera.toUpperCase()} camera...`);
            
            try {
                // Get new stream with desired camera
                const newStream = await getStreamForCamera(targetCamera, true);
                const newVideoTrack = newStream.getVideoTracks()[0];
                
                if (!newVideoTrack) throw new Error('No video track');
                
                // Log the new track settings
                const newSettings = newVideoTrack.getSettings();
                log(`NEW CAMERA: ${newSettings.facingMode}, label: ${newVideoTrack.label}`);
                
                const pc = currentCall.peerConnection;
                if (!pc) throw new Error('No peer connection');
                
                // Find and replace video sender
                const senders = pc.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                
                if (videoSender) {
                    await videoSender.replaceTrack(newVideoTrack);
                    log(`Video track replaced - NOW USING: ${targetCamera} (${newSettings.facingMode})`);
                } else {
                    pc.addTrack(newVideoTrack, newStream);
                    log(`Added new video track - NOW USING: ${targetCamera}`);
                }
                
                // Update audio track if needed
                const audioSender = senders.find(s => s.track && s.track.kind === 'audio');
                if (audioSender && newStream.getAudioTracks()[0]) {
                    await audioSender.replaceTrack(newStream.getAudioTracks()[0]);
                }
                
                // Clean up old stream
                if (localStream && localStream !== newStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
                
                localStream = newStream;
                currentCamera = targetCamera;
                document.getElementById('localVideo').srcObject = newStream;
                
                // Send confirmation with facingMode info
                if (dataConn && dataConn.open) {
                    dataConn.send({ 
                        type: 'camera_switched', 
                        camera: targetCamera,
                        facingMode: newSettings.facingMode
                    });
                }
                
                log(`✅ Switch to ${targetCamera.toUpperCase()} complete`);
                
            } catch (err) {
                log(`Switch failed: ${err.message}`);
            }
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        async function handleIncomingCall(call) {
            const callType = call.metadata?.type || 'voice';
            const isVideo = callType === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call`);
            
            try {
                await detectCameras();
                const stream = await getStreamForCamera(currentCamera, isVideo);
                localStream = stream;
                
                if (isVideo && stream.getVideoTracks().length > 0) {
                    const track = stream.getVideoTracks()[0];
                    const settings = track.getSettings();
                    log(`Initial camera: ${settings.facingMode}, label: ${track.label}`);
                    document.getElementById('localVideo').srcObject = stream;
                }
                
                call.answer(stream);
                currentCall = call;
                
                log(`Call answered - Using ${currentCamera} camera`);
                
                call.on('stream', (remoteStream) => {
                    if (remoteStream) {
                        remoteStream.getTracks().forEach(t => t.enabled = false);
                    }
                });
                
                call.on('close', () => {
                    log('Call ended');
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`);
                    endCall();
                });
                
            } catch (err) {
                log(`Failed to answer: ${err.message}`);
                call.close();
            }
        }
        
        function handleDataMessage(data) {
            log(`Received: ${data.type}`);
            if (data.type === 'switchCamera') {
                switchCamera(data.camera);
            }
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
            log('Call ended');
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE`);
                await detectCameras();
                log(`Ready for connection from ${PARTNER_ID}`);
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Data connection established`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => { dataConn = null; });
                } else {
                    conn.close();
                }
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    call.close();
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('=== ASTRO MONITOR ===');
        log('Device is ready to be remotely controlled');
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
